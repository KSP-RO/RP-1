@PART[*]:HAS[#TechRequired[spaceShuttles],#CrewCapacity[>0]]:BEFORE[zzzKerbalism]
{
	%capsuleTier = SpaceCockpit
	%getsSpaceplaneExperiments = True // Experiments carried out in shuttle
}

@PART[*]:HAS[#TechRequired[modularSpaceStations],#CrewCapacity[>0]]:BEFORE[zzzKerbalism]
{
	%capsuleTier = ShuttlePayload
	%getsSpaceplanePayloadExperiments = True // SpaceLab / SpaceHab
}
// Space Shuttle experiment list:
// STS-2 : 2 day flight - 2 crew
// Shuttle Imaging Radar - check
// Shuttle Multispectral Infrared Radiometer - check
// Feature Identification & Location Experiment - check
