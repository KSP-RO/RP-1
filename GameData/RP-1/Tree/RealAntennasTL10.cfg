//  Add the RealAntennas TL 10 comms upgrade to all antennas.

@PART:HAS[@MODULE[ModuleRealAntenna]]:FOR[xxxRP-0]:NEEDS[RealAntennas]
{
    @MODULE[ModuleRealAntenna],*
    {
        @UPGRADES
        {
            UPGRADE
            {
                name__ = commsTL10
                maxTechLevel = 10
            }
        }
    }
}
