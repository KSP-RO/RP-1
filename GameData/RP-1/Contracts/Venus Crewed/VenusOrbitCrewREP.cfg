CONTRACT_TYPE
{
	name = VenusOrbitCrewRep
	title = Crewed Orbit Venus
	group = CrewedVenusExp
	agent = Flag Planting

	description = Design and successfully launch a craft that can carry at least two crew into orbit around Venus and return them safely to Earth.&br;&br;<color=green>NOTE: This contract will become unavailable once a Crewed Venus Flyby contract is accepted or completed.

	synopsis = Send a crewed vessel into orbit of Venus

	completedMessage = Congratulations! The crew has returned safely and have provided our scientists with information to study.
	sortKey = 1603

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 2
	maxSimultaneous = 1
	deadline = 0

	targetBody = Venus
	
	
	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 800
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedVenusExp
	}
	
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = first_VenusOrbitCrew
	}

	// ************ DATA ************
	DATA
	{
		type = double
		orbitKM = Round((@targetBody.Radius() * 2) / 1000)
		title = Get Minimum Orbit Height
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Orbit Venus
		define = CrewOrbitVenus

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 2
			title = Have at least 2 Crewmembers
			hideChildren = true
		}
		PARAMETER
		{
			name = EnterOrbit
			type = Orbit
			situation = ORBITING
			maxApA = @targetBody.Radius() * 2
			disableOnStateChange = true
			title = Orbit Venus with a maximum Apoapsis of @/orbitKM km
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
}