CONTRACT_TYPE
{
	name = AdvPlane_StationVisit
	title = Space Station Visit
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>A key advantage of spaceplanes is a low-g return from orbit. Our scientists want to exploit this by sending a set of experiments up to our space station, perform them there using its facilities and then return the results to Earth.

	synopsis = Rendezvous with an existing space station, remain docked for one week, and return the crew to Earth.

	completedMessage = Excellent work! The crew has completed their week-long station stay and returned safely. The spaceplane has proven itself as a capable crew taxi.

	sortKey = 421

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 200
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = first_spaceStation
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = SpaceplaneGroup
		type = VesselParameterGroup
		title = Launch and dock the spaceplane
		define = SpaceplaneVisitor
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			title = Reach orbit
			disableOnStateChange = true
			hideChildren = true
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			defineDockedVessel = TargetStation
			title = Dock with an existing space station
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = StayDocked
			type = Duration
			duration = 7d
			preWaitText = Dock with the station first
			waitingText = Remaining docked: @timeRemaining
			completionText = Week-long stay complete!
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = StationPersist
		type = VesselParameterGroup
		title = Keep the station in orbit throughout the visit
		vessel = TargetStation
		completeInSequence = true

		PARAMETER
		{
			name = Orbit
			type = Orbit
			minPeA = 250000
			maxApA = 500000
			targetBody = HomeWorld()
			title = Station must remain in a stable orbit throughout the visit
			hideChildren = true
		}
	}

	PARAMETER
	{
		name = ReturnGroup
		type = VesselParameterGroup
		title = Return the spaceplane to Earth — descent angle lower than 10 degrees
		vessel = SpaceplaneVisitor
		completeInSequence = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = SpaceplaneVisitor
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}