CONTRACT_TYPE
{
	name = first_VenusFlybyCrewed
	title = First Crewed Venus Flyby
	group = CrewedVenusExp
	agent = Flag Planting

	description = We have sent uncrewed missions to our neighboring planet, Venus, but now we want to send Humans to explore. Design, build and launch a mission that sends at least two humans on a flyby of Venus and return them home safely to Earth.

	synopsis = Send a crewed vessel on a flyby of Venus

	completedMessage = Congratulations! Humans have laid their own eyes on Venus for the first time!

	sortKey = 1600

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = Venus


	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 1000
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedVenusExp
	}

	PARAMETER
	{
		name = FlybyCrew
		type = VesselParameterGroup
		title = Flyby crewed flyby of @targetBody
		define = FlybyVenusCrew

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = OneCrew
			type = HasCrew
			minCrew = 1
			crewOnly = true
			title = Have at least 1 crewmember on board
			hideChildren = true
		}
		PARAMETER
		{
			name = FlybyPlanet
			type = ReachState
			targetBody = Venus
			maxAltitude = 20000000
			disableOnStateChange = true
			title = Flyby Venus within 20,000 km
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
}
