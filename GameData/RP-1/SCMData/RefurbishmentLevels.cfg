// Real world:
//   STS:
//     Early program (OV-102, 1981): ~6 months refurbishment
//     Mature program (OV-105, 1992): ~3 months refurbishment
//   F9S1:
//     2016 (first reuse): ~3 months turnaround
//     2020+: ~30 days turnaround

// Note: Cost affects the non-subsidised portion of refurbishment cost.

SCMREFURBTECHS
{
    // 1951
    BASE
    {
        RateRefurbishment   = 1.0 
        CostRefurbishment   = 1.0
    }
    // Gemini?
    TECH
    {
        id                      = materialsScienceAdvCapsules
        RateRefurbishment       = 1.3
        CostRefurbishment       = 0.95
        SplashdownPenaltyMult   = 1.0
    }

    // Shuttle mature?
    TECH
    {
        id                      = materialsScienceCommercial
        RateRefurbishment       = 1.5
        CostRefurbishment       = 0.85
        SplashdownPenaltyMult   = 0.7
    }

    // Falcon 9 Block 5
    TECH
    {
        id                      = materialsScienceNF
        RateRefurbishment       = 1.6
        CostRefurbishment       = 0.75
        SplashdownPenaltyMult   = 0.5 // Drone ships, etc
    }
}