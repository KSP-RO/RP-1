CONTRACT_TYPE
{
	name = EOS3Kennen
	title = High Resolution Digital Earth Imaging Satellite
	group = EOS3
	agent = Federation Aeronautique Internationale

	description = <b>Program: Operational Earth Observation<br>Type: <color=green>Required</color></b><br><br>Your government wants high resolution imagery of Earth, but is no longer willing to pay for the recovery of film capsules. Since we now have access to high fidelity digital cameras, launch one of those instead!<br><br>Launch an analog film camera and retrieve its film.<br><br><b><color="green">Make sure your craft contains an Ultra Resolution Digital Imaging Camera.</color></b><br><br>Historical example: KH-11 (Kennen).	
	synopsis = Launch a High Resolution Earth Imaging satellite.
	completedMessage = Success! The film returned from this satellite allows for detailed analysis of Earth.	
	sortKey = 507
	cancellable = true
	declinable = false
	autoAccept = false
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0	
	targetBody = HomeWorld()

	// Rewards
	prestige = Significant
	rewardReputation = 300	

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = EarthObservationScience3
	}
	PARAMETER
	{
		name = Kennen
		type = VesselParameterGroup
		title = Environmental Satellite
		define = Kennen	
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			hideChildren = true
		}	
		PARAMETER
		{
			name = OrbitSequence
			type = Sequence
			title = Collect imagery from orbit

			PARAMETER
			{
				name = HasPower
				type = HasResource
				resource = ElectricCharge
				minQuantity = 1.0
				title = Craft must have Electric Charge after 8 hours
				hideChildren = true
			}

			PARAMETER
			{
				name = HasExperiment1
				type = RP1HasExperiment
				experiment = RP0photos4
			}

			PARAMETER
			{
				name = Orbit
				type = Orbit
				title = Orbit requirements				
				maxApA = 300000
				minPeA = 160000
				minInclination = 95.5
				maxInclination = 98.5
				disableOnStateChange = true
			}

			PARAMETER
			{
				name = Duration
				type = Duration

				duration = 31d

				preWaitText = Achieve desired orbit
				waitingText = Collect imagery
				completionText = Imagery collection complete
			}
		}
	}
}