	description = <b>Program: Crewed Mercury Exploration<br>Type: <color=blue>Optional</color></b><br><br>Having mastered the Moon and successfully  our next giant leap takes us inward, deep into the Sun’s gravitational well. Landing on Mercury is an orbital mechanics nightmare; surviving on its surface for a full Hermean solar rotation is a triumph of sheer human engineering.The extreme radiation environment, coupled with surface temperatures that fluctuate between melting lead ($427^\circ\text{C}$) and deep cryogenic freezing ($-180^\circ\text{C}$), will push our life support, power generation, and thermal control systems to their absolute geometric limits. Your mission is to land a crewed outpost on the surface of Mercury and maintain a continuous presence for a minimum of 90 days.

	synopsis = Send a crew to land and stay on the surface of Mercury for 3 month and return home safely

	completedMessage = Congratulations! you have successfully completed a 3 month stay on Mercury 

