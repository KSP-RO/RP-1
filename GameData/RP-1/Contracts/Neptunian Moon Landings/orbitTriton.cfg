CONTRACT_TYPE
{
	name = orbitTriton
	title = Triton Orbit (Uncrewed)
	group = NeptuneMoonLandings


	description = <b>Program: Neptunian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Triton and return science data back to Earth.
	genericDescription = Achieve a soft landing on Triton and transmit science.

	synopsis = Achieve a soft landing on Triton and transmit science

	completedMessage = Mission Success! You have safely landed on Triton and returned valuable science data from the surface.  

	sortKey = 713

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	targetBody = Triton

	// ************ REWARDS ************
	prestige = Trivial       // 1.0x
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 600
	failureReputation = 0 // was @rewardReputation


    // ************ DATA ************
	DATA
	{
		type = double
		orbitKM = Round((@targetBody.Radius() * 2) / 1000)
		title = Get Minimum Orbit Height
	}
	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = NeptuneMoonLandings
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Orbit Triton
		define = OrbitTriton

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = EnterOrbit
			type = Orbit
			situation = ORBITING
			maxPeA = @targetBody.Radius() * 2
			disableOnStateChange = true
			title = Orbit Triton with a maximum periapsis of @/orbitKM km
			
			PARAMETER
			{
				name = Duration
				type = Duration

				duration = 2m

				preWaitText = Check for stable orbit
				waitingText = Checking for stable orbit
				completionText = Stable orbit: Confirmed
			}
		}
	}
}
