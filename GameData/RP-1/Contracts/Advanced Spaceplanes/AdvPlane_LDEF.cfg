CONTRACT_TYPE
{
	name = AdvPlane_LDEF
	title = Long Duration Exposure Facility
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</color></b><br><br>While we have sent up countless satellites, we have never studied the effects of space on materials and technology with hands-on samples. Launch one of our spaceplanes, deploy a satellite, recover it after a few days and return the crew and satellite safely to the runway.
	synopsis = Deploy satellite and recover it after a few days.

	completedMessage = Excellent work! The satellite will be studied with great care!
	sortKey = 401

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 20 // Material science data from LDEF was very informative in the long-run
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 200
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeploymentMission
		type = VesselParameterGroup
		title = Satellite Deployment Operations
		define = DeploymentVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasPayload
			type = HasResource
			resource = ComSatPayload
			minQuantity = 4499.9
			title = Carry 4500L of communications payload
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 160000
			targetBody = HomeWorld()
			title = Reach deployment orbit
			disableOnStateChange = true
			hideChildren = true
		}
	}

	PARAMETER
	{
		name = LDEF_FreeFlight
		type = VesselParameterGroup
		title = Deploy satellite for independent free-flight
		define = LDEF_Vessel
		completeInSequence = true 

		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER 
		{ 
			name = HasPayload
			type = HasResource
			resource = ComSatPayload
			minQuantity = 4499.9 
			hideChildren = true
		}
		PARAMETER
		{
			name = LDEFOrbit
			type = Orbit
			minPeA = 160000
			targetBody = HomeWorld()
			disableOnStateChange = false
			hideChildren = true
		}
		PARAMETER
		{
			name = ExposureDuration
			type = Duration
			duration = 7d
			preWaitText = Waiting for satellite separation and stable orbit.
			waitingText = Satellite is exposing experiments to space...
			completionText = Exposure complete. Ready for retrieval.
		}
	}

	PARAMETER
	{
		name = SpaceplaneRetrieval
		type = VesselParameterGroup
		title = Retrieve LDEF and return home
		vessel = SpaceplaneVessel
		completeInSequence = true

		PARAMETER
		{
			name = DockWithLDEF
			type = Docking
			vessel = LDEF_Vessel
			title = Grapple/Dock with the free-flying satellite
			hideChildren = true
			completeInSequence = true
		}
		
		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}