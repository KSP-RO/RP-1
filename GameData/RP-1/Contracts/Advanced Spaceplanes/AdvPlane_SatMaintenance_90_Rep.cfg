CONTRACT_TYPE
{
	name = AdvPlane_SatMaintenance_90_Rep
	title = Spaceplane Satellite Maintenance (90° Inclination)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale	
	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>We have been approached by a telecommunications company - their satellite is stranded in orbit! We have agreed to send one of our spaceplanes up, rendezvous with it and perform a close inspection, before returning home. 	
	synopsis = Rendezvous with the target satellite in LEO and return to Earth.	
	completedMessage = Maintenance complete. The satellite is back online and your vessel has returned successfully.	
	sortKey = 413	
	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0	
	targetBody = HomeWorld()	

	DATA
	{
		type = int
		index = $RepeatSatMaint_Count + 0
	}
	
	DATA
	{
		type = List<double>
		tierAlts = [ 200000.0, 400000.0, 550000.0, 700000.0 ]
	}

	DATA
	{
		type = int
		tierIndex = Min(@index, 3)
	}

	DATA
	{
		type = double
		targetSMA = 6371000.0 + @tierAlts.ElementAt(@tierIndex)
	}

	BEHAVIOUR
	{
		name = IncrementTheCount
		type = Expression
		
		CONTRACT_COMPLETED_SUCCESS
		{
			RepeatSatMaint_Count = $RepeatSatMaint_Count + 1
		}
	}
	
	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 40 + (@tierIndex * 20)
	failureReputation = 0	

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AdvPlane_SatMaintenance_90
	}

	// ************ BACKGROUND VESSEL ************
	BEHAVIOUR
	{
		name = SpawnTargetSatellite
		type = SpawnVessel	
		VESSEL
		{
			name = CommSat
			craftPart = RP-1-CommunicationSat
			vesselType = Probe
			owned = false	
			ORBIT
			{
				SMA = @/targetSMA
				ECC = 0.005
				INC = Random(88,92)
				LAN = Random(0,360)
				LPE = 90
				MNA = 0
				EPH = 0
				REF = 1
			}
		}
	}	
	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = MaintenanceMission
		type = VesselParameterGroup
		title = Spaceplane Maintenance Operations
		define = SpaceplaneVessel
		completeInSequence = true	
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}	
		PARAMETER
		{
			name = RendezvousTarget
			type = Rendezvous
			vessel = CommSat
			distance = 30
			relativeSpeed = 0.5
			title = Rendezvous with the Communications Satellite
			hideChildren = true
		}
	}
	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = SpaceplaneVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	// ************ CLEANUP ************
	BEHAVIOUR
	{
		name = CleanupSatellite
		type = DestroyVessel
		onState = CONTRACT_COMPLETED
		vessel = CommSat
	}
}