CONTRACT_TYPE
{
	name = AdvPlane_Photo_Rep
	title = Spaceplane Weather Satellite Deployment
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>Larger, more capable weather satellites can be launched for cheap using our spaceplane. Launch the spaceplane with a Photography 5 experiment aboard, deploy the experiment, and return the crew safely to the runway.

	synopsis = Deploy a weather satellite from a spaceplane into LEO.

	completedMessage = Excellent work! High quality images are being transmitted!

	sortKey = 423

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 200
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}
	REQUIREMENT
	{
		name = Any
		type = Any
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_30
		}
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_60
		}
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_90
		}
	}
	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeploymentMission
		type = VesselParameterGroup
		title = Satellite Deployment Operations
		define = DeploymentVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasExperiment1
			type = RP1HasExperiment
			experiment = RP0photos4
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 350000
			maxEccentricity = 0.005
			targetBody = HomeWorld()
			title = Reach deployment orbit
			disableOnStateChange = true
			hideChildren = true
		}
		PARAMETER
		{
			name = NotExperiment
			type = NOT 
			PARAMETER
			{
				name = HasExperiment1
				type = RP1HasExperiment
				experiment = RP0photos4
			}
		}

	}

	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}