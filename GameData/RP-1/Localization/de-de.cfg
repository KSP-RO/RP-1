		#rp0_GameplayTip_DontShowAgain = Erinner mich nie mehr

		#rp0_GameplayTip_CrewedProgram_Title = Bemanntes Programm
		#rp0_GameplayTip_CrewedProgram_Text = Du hast ein bemanntes Programm angenommen! Du wirst, falls du es nicht bereits hast, Astronauten anheuern müssen. Stelle sicher, dass du sie auch für das Fliegen von Cockpits, Kapseln und anderen bemannten Modulen ausbildest, die du verwenden willst. Eine Astronaut/in kann nicht in einem Modul starten, oder es später betreten, falls er/sie nicht dafür ausgebildet wurde. Sie brauchen außerdem eine missionsspezifische Ausbildung für das Modul, in dem sie starten. Es ist wichtig anzumerken, dass manche Ausbildungen auch Verbesserungen des Astronautenkomplexes benötigen! Astronauten erholen sich nach einer Mission und Ausbildungen brauchen eine Weile, stell also sicher, dass du ausreichend Astronauten hast, um in deiner gewünschten Frequenz zu fliegen.
		#rp0_GameplayTip_LaunchUntrainedPart_Title = Keine aktiven Ausbildung
		#rp0_GameplayTip_LaunchUntrainedPart_Text = Keine Astronauten haben eine Ausbildung, oder sind in einer, für manche Teile auf diesem Schiff. Du solltest Astronauten in die Ausbildung schicken, falls du sie später auf diesem Schiff fliegen lassen möchtest. Sobald sie ausgebildet wurden, brauchen sie auch eine missionsspezifische Ausbildung für mindestens ein Modul auf dem Schiff vor jedem Flug. Die Module ohne Ausbildung sind:\n<<1>>
		#rp0_GameplayTip_ExcessEC_Title = Überprüfe die Strommenge
		#rp0_GameplayTip_ExcessEC_Text = Aktuelles Schiff scheint exzessiv viel Strom zu haben.\nAm Anfang sind Batterien schwer und teuer, was zu einer großen Δv Verminderung und langen Integrationszeiten führen kann.

		// Leader text
		#rp0_Leaders_Desc_leaderVonBraun = Wernher von Braun entwarf die V2-Rakete für die Nationalsozialisten, zog dann im Rahmen der Operation Paperclip nach Amerika und begann seine Arbeit bei der U.S. Army Ballistic Missile Agency (ABMA). Nach dem Fehlschlag von Vanguard 1 startete die ABMA erfolgreich Explorer 1 auf einer Juno-I-Rakete, die von der Redstone abgeleitet war. Die ABMA wurde daraufhin als Marshall Space Flight Center in die NASA eingegliedert, wo er maßgeblich an der Konstruktion der Saturn I und V beteiligt war. Er wurde kritisiert, zu vorsichtig zu sein und möglicherweise Verbrechen gegen die Menschlichkeit begangen zu haben, obwohl er nie vor Gericht gestellt wurde.
		#rp0_Leaders_Desc_leaderRosen = Milton Rosen leitete die Viking- und Vanguard-Programme für das Naval Research Laboratory, bevor letzteres in die NASA eingegliedert wurde, um den Kern des Goddard Space Flight Centers zu bilden. Nach Vanguard wurde Rosen Direktor für Trägerraketen und Antriebe bei der NASA, wo er half, den Grundstein für die Trägerraketen Saturn I und V zu legen, und das Programm initiierte, das die einfache Oberstufe von Vanguard mit dem Thor-Booster kombinierte: Thor-Delta, später Delta.
		
