CONTRACT_TYPE
{
	name = Crewed_Mercury_orbit
	title = Orbit Mercury (Crewed)
	group = CrewedMercuryExp
	agent = Flag Planting

	description = <color=green>Required</color> Design and successfully launch a craft that can carry at least four crew into orbit around Mercury and return them safely to Earth.

	synopsis = Send a crewed vessel into orbit of Mercury

	completedMessage = Congratulations! The crew has returned safely and have provided our scientists with information to study.

	sortKey = 2030

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0

	targetBody = Mercury
// ************ REWARDS ************
	prestige = Significant            // 1.0x
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 900
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************
REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedMercuryExp
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = Crewed_Mercury_flyby
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Orbit Mercury
		define = CrewOrbitMercury

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 4
			title = Have at least 4 Crewmembers
			hideChildren = true
		}
		PARAMETER
		{
			name = EnterOrbit
			type = Orbit
			situation = ORBITING
			minPeA = 200000
			maxApA = 800000
			disableOnStateChange = true
			title = Orbit Mercury with a maximum Apoapsis of 800km and hold it for at least 4 days
			hideChildren = true

			PARAMETER
			{
				name = Duration
				type = Duration
				duration = 4d
				preWaitText = Reach specified orbit
				waitingText = Orbiting...
				completionText = Orbits are complete, you may return to Earth when ready
			}
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
	PARAMETER
	{
		name = CollectScience
		type = CollectScience
		recoveryMethod = RecoverOrTransmit
		title = Return Science from your flyby of Mercury
		hideChildren = true
	}
}
