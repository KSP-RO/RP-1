CONTRACT_TYPE
{
	name = AdvPlane_IP_Venus
	title = Spaceplane launched Venus Mission
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=red>Capstone</color></b><br><br>In order to validate that expendable rockets are fully a thing of the past, we also need to validate its capability to launch interplanetary probes. Launch our spaceplane, deploy a probe, send it on its way to Venus and return the crew safely to the runway.
	synopsis = Send a probe to Venus

	completedMessage = Excellent work! The probe has returned data from Venus, validating this avenue of our spaceplane's capability!
	sortKey = 400

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Exceptional
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 350
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	REQUIREMENT
	{
		name = Any
		type = Any
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_30
		}
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_60
		}
		REQUIREMENT
		{
			name = CompleteContract
			type = CompleteContract
			contractType = AdvPlane_SatDeployment_90
		}
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeploymentMission
		type = VesselParameterGroup
		title = Satellite Deployment Operations
		define = DeploymentVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}
		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			targetBody = HomeWorld()
			title = Reach deployment orbit
			disableOnStateChange = true
			hideChildren = true
		}
	}

    PARAMETER
	{
		name = Venus_Mission
		type = VesselParameterGroup
		title = Send a probe to Venus
		define = Venus_Probe
		completeInSequence = true 

		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = FlybyPlanet
			type = ReachState
			maxAltitude = 20000000
			disableOnStateChange = true
			targetBody = Venus
			title = Flyby Venus within 20,000 km
			hideChildren = true
		}
		PARAMETER
		{
			name = CollectSpaceScience
			type = CollectScience
			recoveryMethod = Transmit
			title = Transmit science data from space near Venus
			hideChildren = true
		}
	}

	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}