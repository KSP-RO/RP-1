CCONTRACT_TYPE
{
    name = VenusSpaceStation
    title = Venus Space Station
    group = CrewedVenusExp
    agent = Stations
    description = <b>Program: Crewed Venus Exploration <br>Type: <color=green>Required</color></b><br><br>Design, build, and launch a space station into orbit of Venus, crew it for 4 months with at least four crew, and bring the crew safely home. Once you're done, youll get missions to perform further crew rotations and resupply missions, as well as expansion or replacement missions.<br><br>Don't forget that the transfer window to Venus is often around 2 years. Make sure you bring enough Life Support to last long enough for a resupply mission to get there.

    synopsis = Launch a Space Station into Venusian Orbit and crew it for 4 months (121 days)

    completedMessage = Congratulations! Your space station is now in orbit around Venus and the first crew has put it through the shake-out process.

    sortKey = 2000

    cancellable = true
    declinable = false
    autoAccept = false
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
    deadline = 0

    targetBody = Venus

    // ************ REWARDS ************
    prestige = Significant  
    advanceFunds = 0
    rewardScience = 0
    rewardReputation = 200
    rewardFunds = 0
    failureReputation = 0
    failureFunds = 0

    // ************ REQUIREMENTS ************
    REQUIREMENT
    {
        name = ProgramActive
        type = ProgramActive
        program = CrewedVenusExp
    }
    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = EarlyEarthSpaceStation
    }
    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = CrewedLunarOrbitRepeat
    }
    REQUIREMENT
    {
        name = CompleteContract
        type = CompleteContract
        contractType = VenusOrbitCrew
    }

    // ************ PARAMETERS ************

    // 1. LAUNCH UNCREWED STATION CORE
    PARAMETER
    {
        name = vesselGroupLaunch
        type = VesselParameterGroup
        title = Put a Space Station into Venusian Orbit
        notes = The station must include at least 1 Docking Port and support for at least 4 Crew
        define = spaceStationVenus
        defineList = spaceStationsVenus

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a New Station
            hideChildren = true
        }
        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }
        PARAMETER
        {
            name = HasCapacity
            type = HasCrewCapacity
            minCapacity = 4
            title = Space for at least 4 crew
            hideChildren = true
            disableOnStateChange = false
        }
        PARAMETER
        {
            name = DockingPort
            type = PartValidation
            partModule = ModuleDockingNode
            minCount = 1
            title = Have at least 1 Docking Port
            hideChildren = true
        }
        PARAMETER
        {
            name = Orbit
            type = Orbit
            minPeA = 325000
            maxApA = 5000000
            targetBody = Venus
            title = Reach Orbit with a Periareion greater than 325 km and an Apoareion less than 5,000 km
            hideChildren = true
        }
        disableOnStateChange = true
    }
    PARAMETER
    {
        name = vesselGroupCrew
        type = VesselParameterGroup
        title = Bring at least 4 crew to the station
        define = crewCapsuleVenus

        completeInSequence = true

        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 4
            title = Have at least 4 crewmembers on board
            hideChildren = true
        }
        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            vessel = spaceStationVenus
            distance = 1000
        }
    }

    PARAMETER
    {
        name = stayOnStation
        type = VesselParameterGroup
        title = Keep at least 4 crew aboard the station for 4 months.
        vessel = spaceStationVenus

        completeInSequence = true

        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 4
            title = Have at least 4 crewmembers on board
            hideChildren = true
        }
        PARAMETER
        {
            name = Orbit
            type = Orbit
            minPeA = 300000
            maxApA = 10000000
            targetBody = Venus
            title = Remain in a Stable Orbit
            hideChildren = true
        }
        PARAMETER
        {
            name = Duration
            type = Duration
            duration = 121d
            preWaitText = Transfer to the station in the specified orbit.
            waitingText = Orbiting Venus...
            completionText = Stay completed, you may return home now.
        }
    }
	
    PARAMETER
    {
        name = vesselGroupStationPersist
        type = VesselParameterGroup
        title = Keep the station in a stable orbit for future operations
        vessel = spaceStationVenus

        completeInSequence = true

        PARAMETER
        {
            name = Orbit
            type = Orbit
            minPeA = 300000
            maxApA = 10000000
            targetBody = Venus
            title = Maintain a safe periareion above the atmosphere
            hideChildren = true
        }
    }
}