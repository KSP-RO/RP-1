CONTRACT_TYPE
{
	name = EOS2ATS1	
	title = Geostationary Weather Satellite
	group = EOS2
	agent = Federation Aeronautique Internationale
	
	description = <b>Program: Advanced Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Your government wants satellites capable of monitoring the weather in a hempishere. Launch a satellite to fulfill their request.<br><br><b><color="green">Make sure your craft contains a Cosmic Ray experiment, a Helium Magnetometer, a Mass Spectrometer and a Basic TV Camera.</color></b><br><br>Historical example: ATS-1.

	synopsis = Launch the first geostationary weather satellite.

	completedMessage = Success! The data from this satellite allows monitoring the weather of an entire hemisphere!

	sortKey = 501

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 100
	failureReputation = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = EarthObservationScience2
	}

	PARAMETER
	{
		name = ATS
		type = VesselParameterGroup
		title = Geostationary Weather Satellite

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}

		PARAMETER
		{
			name = OrbitSequence
			type = Sequence
			title = Survive in orbit for 7 days

			PARAMETER
			{
				name = HasPower
				type = HasResource
				title = Craft must have Electric Charge for 7 days
				resource = ElectricCharge
				minQuantity = 1.0
				hideChildren = true
			}

			PARAMETER
			{
				name = SciencePayload
				type = VesselParameterGroup
				title = Carry the required science instruments

				PARAMETER
				{
					name = HasExperiment1
					type = RP1HasExperiment
					experiment = RP0visibleImaging2
				}
				
				PARAMETER
				{
					name = HasExperiment2
					type = RP1HasExperiment
					experiment = RP0cosmicRay2
				}

				PARAMETER
				{
					name = HasExperiment3
					type = RP1HasExperiment
					experiment = RP0magScan2
				}

				PARAMETER
				{
					name = HasExperiment4
					type = RP1HasExperiment
					experiment = RP0massSpec2
				}
			}
			
			PARAMETER
			{
				name = Orbit
				type = Orbit
				title = Reach a Geostationary Orbit
				minPeriod = 23h 55m 0s
				maxPeriod = 23h 57m 0s

				maxEccentricity = 0.01  // Circular
				maxInclination = 5.0    // Equatorial

				disableOnStateChange = true
				
			}

			PARAMETER
			{
				name = Duration
				type = Duration
				duration = 7d
				preWaitText = Check for stable orbit
				waitingText = Checking for stable orbit
				completionText = Stable orbit: Confirmed
			}
		}
	}
}
