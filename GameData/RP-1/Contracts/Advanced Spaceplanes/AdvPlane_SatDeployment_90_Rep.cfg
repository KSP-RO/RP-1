CONTRACT_TYPE
{
	name = AdvPlane_SatDeployment_90_Rep
	title = Spaceplane Satellite Deployment (90° Inclination)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>A telecommunications company has contracted us to deploy a new communications satellite using one of our spaceplanes. Launch the spaceplane, deploy the satellite into the target orbit, and return the crew safely to the runway.
	synopsis = Deploy a communications satellite from a spaceplane into LEO.

	completedMessage = Excellent work! The satellite has been successfully deployed and is now operational. The client is delighted.
	sortKey = 407

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	DATA
	{
		type = int
		index = $RepeatSatDeploy_Count + 0
	}
	
	DATA
	{
		type = List<double>
		tierAlts = [ 200000.0, 400000.0, 550000.0, 700000.0 ]
	}

	DATA
	{
		type = int
		tierIndex = Min(@index, 3)
	}

	DATA
	{
		type = double
		minPeA = @tierAlts.ElementAt(@tierIndex)
		maxApA = @minPeA + 100000.0
	}

	BEHAVIOUR
	{
		name = IncrementTheCount
		type = Expression
		
		CONTRACT_COMPLETED_SUCCESS
		{
			RepeatSatDeploy_Count = $RepeatSatDeploy_Count + 1
		}
	}

	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 150 + (@tierIndex * 20)
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AdvPlane_SatDeployment_90
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeploymentMission
		type = VesselParameterGroup
		title = Satellite Deployment Operations
		define = DeploymentVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasPayload
			type = HasResource
			resource = ComSatPayload
			minQuantity = 4499.9
			title = Carry 4500L of communications payload
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = @/minPeA
			maxApA = @/maxApA
			minInclination = 88.0
			maxInclination = 92.0
			targetBody = HomeWorld()
			title = Reach deployment orbit
			disableOnStateChange = true
		}

		PARAMETER
		{
			name = DeployPayload
			type = HasResource
			resource = ComSatPayload
			maxQuantity = 0
			title = Deploy the satellite payload
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}