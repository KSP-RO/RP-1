CONTRACT_TYPE
{
	name = EOS2OGO1	
	title = Orbiting Geophysical Observatory
	group = EOS2
	agent = Federation Aeronautique Internationale
	
	description = <b>Program: Advanced Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Your government wants a satellite capable of more advanced geophysical research. Launch a satellite to fulfill their request.<br><br><b><color="green">Make sure your craft contains a Helium Magnetometer and a Mass Spectrometer. Science requirements can be met over multiple launches.</color></b><br><br>Historical example: OGO 1.

	synopsis = Launch a geophysical research satellite.

	completedMessage = Success! The data from this satellite allows for a better geodetic understanding of Earth!

	sortKey = 502

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant       // 1.0x
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 150
	failureReputation = 0 // was @rewardReputation

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = EarthObservationScience2
	}

	PARAMETER
	{
		name = OGO
		type = VesselParameterGroup
		title = Orbiting Geophysical Observatory
		define = OGO

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}

		PARAMETER
		{
			name = OrbitSequence
			type = Sequence
			title = Survive in orbit for 7 days

			PARAMETER
			{
				name = HasPower
				type = HasResource
				title = Craft must have Electric Charge for 7 days
				resource = ElectricCharge
				minQuantity = 1.0				
				hideChildren = true
			}

			PARAMETER
			{
				name = SciencePayload
				type = VesselParameterGroup
				title = Carry the required science instruments

				PARAMETER
				{
					name = HasExperiment1
					type = RP1HasExperiment
					experiment = RP0massSpec1
				}

				PARAMETER
				{
					name = HasExperiment2
					type = RP1HasExperiment
					experiment = RP0cosmicRay1
				}

				PARAMETER
				{
					name = HasExperiment3
					type = RP1HasExperiment
					experiment = RP0RPWS1
				}

				PARAMETER
				{
					name = HasExperiment4
					type = RP1HasExperiment
					experiment = RP0magScan2
				}
			}


			PARAMETER
			{
				name = Orbit
				type = Orbit
				title = Orbit requirements				
				minApA = 100000000 //100k km
				maxPeA = 400000 // 400 km
				minPeA = 250000 //250 km
				minInclination = 30 // OGO-1 was 37.1°
				maxInclination = 40
				disableOnStateChange = true
			}

			PARAMETER
			{
				name = Duration
				type = Duration
				duration = 7d
				preWaitText = Check for stable orbit
				waitingText = Checking for stable orbit
				completionText = Stable orbit: Confirmed
			}
		}
	}
}
