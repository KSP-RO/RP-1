CONTRACT_TYPE
{
	name = samplesMars
	title = Mars Sample Return
	group = AdvancedMartianSurfaceExploration
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Mars Surface Exploration<br>Type: <color=red>Capstone</color></b><br><br>Design and successfully launch an uncrewed probe to land on Mars, gather science, and bring something back to Earth for study. This is a sample return missions so you cannot just transmit the data back, it needs to be physically returned.

	synopsis = Send an uncrewed craft to land on Mars and return the science to Earth.

	completedMessage = Congratulations! Our scientists can learn a lot more about the make-up of the planet by studying the physical samples that you have returned.

	sortKey = 2102

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = Mars



	// ************ REWARDS ************
	prestige = Exceptional
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 2000 // twice that of phobos sample return due to added complexity
	failureReputation = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvMarsSurf
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Mars Sample Return
		define = SampleMars

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = Landing
			type = ReachState
			situation = LANDED
			situation = SPLASHED
			disableOnStateChange = true
			title = Safely land on Mars
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return to Earth safely with the samples
			hideChildren = true
			completeInSequence = true
		}
	}
	PARAMETER
	{
		name = SurfaceScience
		type = CollectScience
		situation = SrfLanded
		situation = SrfSplashed
		recoveryMethod = Recover
		title = Gather science while landed and <b><color=white>Return it home, DO NOT TRANSMIT</color></b>
		hideChildren = true
	}
}
