CONTRACT_TYPE
{
	name = AdvPlane_StationModule
	title = Space Station Module Delivery
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</color></b><br><br> Since our spaceplane has a sizeable payload bay, we can combine visits to our space station with launching modules to it! Carry a module for the space station in the payload bay, dock it to the space station and return home safely.

	synopsis = Deliver and dock a new station module using the spaceplane, then return to Earth.

	completedMessage = Station expansion complete! The new module has been successfully delivered and integrated. The spaceplane has proven it can do more than carry crew.

	sortKey = 422

	cancellable = false
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Exceptional
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 120
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AdvPlane_StationVisit
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeliveryGroup
		type = VesselParameterGroup
		title = Launch the spaceplane with a station module in the payload bay
		define = DeliverySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			crewOnly = true
			title = Have at least 2 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasDockingPort
			type = PartValidation
			partModule = ModuleDockingNode
			minCount = 2
			title = Vessel must have at least 2 docking ports — one for the station, one on the module
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrewCapacityModule
			type = HasCrewCapacity
			minCapacity = 4
			title = The vessel and module together must provide space for at least 4 crew
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			title = Reach orbit
			disableOnStateChange = true
			hideChildren = true
		}

		PARAMETER
		{
			name = RendezvousStation
			type = Rendezvous
			distance = 100
			title = Rendezvous with the station
			completeInSequence = true
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			defineDockedVessel = TargetStation
			title = Dock with the station to deliver the module
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = StationExpandedPersist
		type = VesselParameterGroup
		title = Confirm the expanded station remains in orbit
		vessel = TargetStation
		completeInSequence = true

		PARAMETER
		{
			name = Orbit
			type = Orbit
			minPeA = 250000
			maxApA = 500000
			targetBody = HomeWorld()
			title = The expanded station must be in a stable orbit with a perigee greater than 250 km and an apogee less than 500 km
			hideChildren = true
		}

		PARAMETER
		{
			name = HasExpandedCapacity
			type = HasCrewCapacity
			minCapacity = 4
			title = The station now accommodates at least 4 crew
			hideChildren = true
		}
	}

	PARAMETER
	{
		name = ReturnGroup
		type = VesselParameterGroup
		title = Return the spaceplane to Earth — descent angle lower than 10 degrees
		vessel = DeliverySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeliverySpaceplane
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}