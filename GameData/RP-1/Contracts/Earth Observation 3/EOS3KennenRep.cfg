CONTRACT_TYPE
{
	name = EOS3KennenRep	
	title = High Resolution Digital Earth Imaging Satellite
	group = EOS3
	agent = Federation Aeronautique Internationale
	
	description = <b>Program: Operational Earth Observation<br>Type: <color=blue>Optional</color></b><br><br>With digital orbital imagery now a proven capability, send up a follow-on early-generation imagery satellite for a longer duration in orbit. This will allow the collection of far more data with repeat passes over the same points on the surface. <b><color="yellow">Make sure your craft contains an Ultra Resolution Digital Imaging Camera.</color></b><br><br><b>Number of Contracts Completed: @index / @maxCompletions</b><br><br>Historical example: Kennen/Keyhole-11

	synopsis = Launch dedicated High Resolution Imagery satellites for longer missions.

	completedMessage = Longterm high resolution imagery satellites are now a proven technology.

	sortKey = 508

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 8
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 250
	failureReputation = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = EarthObservationScience3
	}

	REQUIREMENT	
	{	name = CompleteContract
		type = CompleteContract
		contractType = EOS3Kennen
		title = Completed High Resolution Digital Earth Imaging Satellite
	}

	DATA
	{
		type = int
		index = $RepeatKennenSats_Count
	}

	BEHAVIOUR
	{
		name = IncrementTheCount
		type = Expression
		
		CONTRACT_COMPLETED_SUCCESS
		{
			RepeatKennenSats_Count = $RepeatKennenSats_Count + 1
		}
	}
	
	//************* PARAMETERS ***************
	PARAMETER
	{
		name = Kennen
		type = VesselParameterGroup
		title = High Resolution Digital Imagery Satellite

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			hideChildren = true
		}
		PARAMETER 
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			hideChildren = true
		}	
		PARAMETER
		{
			name = OrbitSequence
			type = Sequence
			title = Collect imagery from orbit

			PARAMETER
			{
				name = HasPower
				type = HasResource
				resource = ElectricCharge
				minQuantity = 1.0
				title = Craft must have Electric Charge after 31 dayss
				hideChildren = true
			}

			PARAMETER
			{
				name = HasExperiment1
				type = RP1HasExperiment
				experiment = RP0photos4
			}

			PARAMETER
			{
				name = Orbit
				type = Orbit
				title = Orbit requirements				
				maxApA = 1000000 // Kennen max
				minPeA = 350000 // Kennen min.  
				minInclination = 95.5
				maxInclination = 98.5
				disableOnStateChange = true
			}

			PARAMETER
			{
				name = Duration
				type = Duration

				duration = 31d

				preWaitText = Achieve desired orbit
				waitingText = Collect imagery
				completionText = Imagery collection complete
			}
		}
	}
}
