CONTRACT_TYPE
{
	name = AdvPlane_SatDeployment_30
	title = Spaceplane Satellite Deployment (30° Inclination)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</color></b><br><br>A telecommunications company has contracted us to deploy a new communications satellite using one of our spaceplanes. Launch the spaceplane, deploy the satellite into the target orbit, and return the crew safely to the runway.

	synopsis = Deploy a communications satellite from a spaceplane into LEO.

	completedMessage = Excellent work! The satellite has been successfully deployed and is now operational. The client is delighted.

	sortKey = 402

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 300
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeploymentMission
		type = VesselParameterGroup
		title = Satellite Deployment Operations
		define = DeploymentVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasPayload
			type = HasResource
			resource = ComSatPayload
			minQuantity = 4499.9
			title = Carry 4500L of communications payload
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 400000
			maxApA = 500000
			minInclination = 28.0
			maxInclination = 32.0
			targetBody = HomeWorld()
			title = Reach deployment orbit
			disableOnStateChange = true
		}

		PARAMETER
		{
			name = DeployPayload
			type = HasResource
			resource = ComSatPayload
			maxQuantity = 0
			title = Deploy the satellite payload
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeploymentVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}