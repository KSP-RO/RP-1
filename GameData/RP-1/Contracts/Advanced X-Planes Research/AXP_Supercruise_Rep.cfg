CONTRACT_TYPE
{
	name = AXP_Supercruise_Rep
	group = AdvXPlanes
	title = Uncrewed Long Duration Supersonic Cruise
	description = FIXME
	synopsis = Travel @/minFlightTime.ElementAt(@/index) minutes or more with an uncrewed supersonic jet-powered craft carrying @/missionPayload.Print() units of Sounding Payload.
	completedMessage = Congratulations on a successful flight!
	sortKey = 4501
	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0
	targetBody = HomeWorld()
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 75
	failureReputation = 0
	supportsPreview = true
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvXPlanes
		targetBody = @/targetBody
	}
	DATA
	{
		title = Payload
		type = int
		missionPayload = 50
	}
	DATA
	{
		type = int
		index = 0
	}
	DATA
	{
		type = List<float>
		minFlightTime = [ 90, 120, 150, 180 ]
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AXP_Supercruise
		targetBody = @/targetBody
	}
	REQUIREMENT
	{
		name = AcceptContract
		type = AcceptContract
		tag = exclude_Supersonic
		invertRequirement = true
		targetBody = @/targetBody
	}
	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Maintain between @HoldSituation/minSpeed m/s and @HoldSituation/maxSpeed m/s in level flight with an uncrewed jet aircraft.
		define = supersonicCraft
		dissassociateVesselsOnContractCompletion = true
		resetChildrenWhenVesselDestroyed = true
		targetBody = @/targetBody
		PARAMETER
		{
			name = BuiltAtSPH
			type = VesselBuiltAt
			builtAt = SPH
			targetBody = @/targetBody
		}
		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
			targetBody = @/targetBody
		}
		PARAMETER
		{
			name = NoRocket
			type = PartValidation
			title = Vessel is a jet (no rocket engines allowed)
			hideChildren = true
			targetBody = @/targetBody
			NONE
			{
				partModule = ModuleEnginesRF
				partModule = ModuleEnginesAJEPropeller
			}
		}
		PARAMETER
		{
			name = HasSoundingPayload
			type = HasResource
			resource = SoundingPayload
			minQuantity = @/missionPayload - 0.1
			title = Have a SoundingPayload of at least @/missionPayload.Print() units on the craft
			hideChildren = true
			targetBody = @/targetBody
		}
		PARAMETER
		{
			name = HoldSituation
			type = ReachState
			minSpeed = 815
			maxSpeed = 1150
			minRateOfClimb = -50
			maxRateOfClimb = 50
			situation = FLYING
			title = Hold between @minSpeed m/s to @maxSpeed m/s in level flight.
			disableOnStateChange = true
			targetBody = @/targetBody
			PARAMETER
			{
				name = Duration
				type = Duration
				duration = @/minFlightTime.ElementAt(@/index)
				preWaitText = Reach specified speed.
				waitingText = Testing long-duration supersonic flight
				completionText = Flight completed.
				targetBody = @/targetBody
			}
		}
	}
}