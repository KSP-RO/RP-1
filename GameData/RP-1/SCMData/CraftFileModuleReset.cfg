// Flight-only PartModule state that must be reset before a vessel is written to a .craft file.
//
// RP-1's vessel recovery intentionally carries flight scene state over to the editor so that
// re-flying a recovered vessel keeps the same engine wear and engine refurbishment is costed.
// That state (mostly TestFlight bookkeeping) must never leak into saved craft files though,
// otherwise building and launching such a craft would start with used or even failed engines.
//
// Each MODULE node is matched by name against the modules of every part being saved. A trailing
// '*' in the name matches by prefix (e.g. "TestFlightFailure*" matches every failure module), so
// a single rule can cover all current and future variants. Plain "key = value" entries reset a
// field to the given value (only when the field is already present, so the result matches a freshly
// built part). "removeValue = <field>" and "removeNode = <node>" strip a persisted field or child
// node entirely. All rules matching a module are applied.
SCMCraftFileModuleReset
{
	// Every TestFlight failure module persists a "failed" flag (TestFlightFailureBase); the engine
	// ones also cache per-engine state in ENGINESTATE / ENGINE_RUN_DATA nodes. None of this exists
	// on a freshly built part, so clear it for all failure module variants.
	MODULE
	{
		name = TestFlightFailure*
		failed = False
		removeNode = ENGINESTATE
		removeNode = ENGINE_RUN_DATA
	}
	MODULE
	{
		name = TestFlightFailure_IgnitionFail
		numIgnitions = 0
		pendingIgnitionDU = 0
		previousTime = 0
	}
	// lastRecordedMet lives on FlightDataRecorderBase, lastCheck on TestFlightReliabilityBase, so match every subclass by prefix.
	MODULE
	{
		name = FlightDataRecorder*
		lastRecordedMet = 0
	}
	MODULE
	{
		name = TestFlightReliability*
		lastCheck = 0
	}
	MODULE
	{
		name = TestFlightReliability_EngineCycle
		engineOperatingTime = 0
		currentRunTime = 0
		previousOperatingTime = 0
	}
}
