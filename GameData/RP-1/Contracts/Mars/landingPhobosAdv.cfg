CONTRACT_TYPE
{
	name = landingPhobosAdv
	title = Advanced Phobos Landing
	group = AdvancedMartianSurfaceExploration
	agent = Surveys

	description = <b>Program: Advanced Mars Surface Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an advanced uncrewed probe that will soft land on Phobos and transmit a science report from the surface.

	synopsis = Send an uncrewed probe to land on Phobos

	completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.

	sortKey = 2101

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = Phobos



	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 300
	failureReputation = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvMarsSurf
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Advanced uncrewed landing on Phobos
		
		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}

		PARAMETER
		{
			name = SciencePayload
			type = VesselParameterGroup
			title = Carry the required science instruments
			PARAMETER
			{
				name = HasExperiment1
				type = RP1HasExperiment
				experiment = RP0visibleImaging3
			}
			PARAMETER
			{
				name = HasExperiment2
				type = RP1HasExperiment
				experiment = surfaceAnalysis
			}
			PARAMETER
			{
				name = HasExperiment3
				type = RP1HasExperiment
				experiment = RP0RPWS2
			}
		}

		PARAMETER
		{
			name = EnterAtmo
			type = ReachState
			situation = LANDED
			situation = SPLASHED
			disableOnStateChange = true
			title = Safely land on Phobos
			hideChildren = true
		}
		PARAMETER
		{
			name = SurfaceScience
			type = CollectScience
			situation = SrfLanded
			situation = SrfSplashed
			recoveryMethod = Transmit
			title = Transmit science data from the surface
			hideChildren = true
		}
	}
}
