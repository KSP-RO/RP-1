CONTRACT_TYPE
{
    name = MultiPointSolarObservation
    title = Multi-Point Solar Observation
    group = SolarExploration
    agent = Federation Aeronautique Internationale

    description = <b>Program: Sun Exploration<br>Type: <color=green>Required</color></b><br><br>Launch two separate observatories into heliocentric orbit. Place one slightly ahead of Earth's orbit (closer to the Sun) and one slightly behind (further from the Sun) to establish a multi-point view of solar phenomena.<br><br>Real life example: STEREO-A and STEREO-B

    synopsis = Position two probes in specific heliocentric orbits to observe the Sun.

    completedMessage = Both observatories are on station. Dual-perspective solar monitoring is active.

    sortKey = 805

    cancellable = true
    declinable = true
    autoAccept = false
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
    deadline = 0

    targetBody = Sun

    // ************ REWARDS ************
    prestige = Significant       // 2.0x
    advanceFunds = 0
    rewardScience = 0
    rewardFunds = 0
    failureFunds = 0
    rewardReputation = 500
    failureReputation = 0

    // ************ REQUIREMENTS ************

    REQUIREMENT
    {
        name = ProgramActive
        type = ProgramActive
        program = SolarExploration
    }

    // ************ PARAMETERS ************

    PARAMETER
    {
        name = StereoA
        type = VesselParameterGroup
        title = STEREO-A (Ahead Observatory)
        define = STEREO_A
    
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }
        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }
        PARAMETER
        {
            name = OrbitA
            type = Orbit
            targetBody = Sun
            title = Establish a solar orbit inside Earth's orbit
            maxApA = 146000000000  
            minPeA = 140000000000
            disableOnStateChange = true
        }
    }

    PARAMETER
    {
        name = StereoB
        type = VesselParameterGroup
        title = STEREO-B (Behind Observatory)
        define = STEREO_B
    
        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }
        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }
        PARAMETER
        {
            name = OrbitB
            type = Orbit
            targetBody = Sun
            title = Establish a solar orbit outside Earth's orbit
            minPeA = 150000000000 
            maxApA = 165000000000
            disableOnStateChange = true
        }
    }
}