CONTRACT_TYPE
{
    name = InterstellarProbe_Rep
    group = InterstellarProbes

    title = Additional Interstellar Probe
    genericTitle = Additional Interstellar Probe
    description = <b>Program: Interstellar Probes<br>Type: <color=blue>Optional</color></b><br><br><br><br><b>Number of Contracts Completed: @index / @maxCompletions</b><br><b>Target Velocity for this launch: @targetVelocityKmS km/s</b>
    genericDescription = Reach 40 AU from the Sun at increasingly higher velocities.
    completedMessage = Telemetry confirmed. The probe has crossed the 40 AU mark at the target velocity. 
    synopsis = Launch a probe that reaches an altitude of 40 AU from the Sun while maintaining a heliocentric speed of at least @/targetVelocityKmS km/s.

    sortKey = 999

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 4
    maxSimultaneous = 1
    deadline = 0
    cancellable = true
    declinable = true
    autoAccept = false
    
    targetBody = Sun

    // ************ REWARDS ************
    prestige = Trivial 
    advanceFunds = 0
    rewardScience = 0
    rewardFunds = 0
    failureFunds = 0
    rewardReputation = 10000 
    failureReputation = 0

    // ************ REQUIREMENTS ************

    REQUIREMENT
    {
        name = ProgramActive
        type = ProgramActive
        program = InterstellarProbes
    }

    REQUIREMENT 
    {   
        name = CompleteContract
        type = CompleteContract
        contractType = InterstellarProbe
        title = Completed Interstellar Probe
    }
    
    DATA
    {
        type = int
        index = $RepeatInterstellar_Count
    }

    BEHAVIOUR
    {
        name = IncrementTheCount
        type = Expression
        
        CONTRACT_COMPLETED_SUCCESS
        {
            RepeatInterstellar_Count = $RepeatInterstellar_Count + 1
        }
    }

    // ************ DATA ************
    DATA
    {
        type = float
        targetAU = 40.0
    }
    
    DATA
    {
        type = float
        targetVelocityKmS = 60.0 + (@index * 5.0)
    }
    
    // Convert from AU to Metres
    DATA
    {
        type = double
        auToMeters = 149597870700.0
    }

    PARAMETER
    {
        name = MissionParameters
        type = VesselParameterGroup
        title = Reach @/targetAU AU from the Sun at >= @/targetVelocityKmS km/s

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = BuiltAtVAB
            type = VesselBuiltAt
            builtAt = VAB
        }

        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }

        PARAMETER
        {
            name = ReachTargetState
            type = ReachState
            minAltitude = @/targetAU * @/auToMeters
            minSpeed = @/targetVelocityKmS * 1000
            disableOnStateChange = true
            title = Reach a distance of at least @/targetAU AU from the Sun with a velocity of at least @/targetVelocityKmS km/s
        }
    }
}