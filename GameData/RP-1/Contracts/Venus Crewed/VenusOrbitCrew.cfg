CONTRACT_TYPE
{
	name = first_VenusOrbitCrew
	title = First Crewed Venus Orbit
	group = CrewedVenusExp
	agent = Flag Planting

	description = We have successfully flown past Venus, but now our objective is to enter a stable orbit around our neighboring world and return home safely.

	synopsis = Send a crewed vessel into orbit of Venus

	completedMessage = Congratulations! The crew has returned safely from Venus orbit!
	sortKey = 1601

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = Venus

	// ************ REWARDS ************
	prestige = Exceptional
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 1200
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedVenusExp
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = first_VenusFlybyCrewed
	}

	// ************ DATA ************
	DATA
	{
		type = double
		orbitKM = Round((@targetBody.Radius() * 2) / 1000)
		title = Get Minimum Orbit Height
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Orbit Venus
		define = FirstCrewOrbitVenus

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 2
			title = Have at least 2 Crewmembers
			hideChildren = true
		}
		PARAMETER
		{
			name = EnterOrbit
			type = Orbit
			situation = ORBITING
			maxApA = @targetBody.Radius() * 2
			disableOnStateChange = true
			title = Orbit Venus with a maximum Apoapsis of @/orbitKM km
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
}
