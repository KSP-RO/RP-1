// ============================================================================
// Early Game Milestones
// ============================================================================
RP0_MILESTONE
{
	name = BreakSoundBarrierMilestone
	contractName = BreakSoundBarrier
	screenshotContractParamName = BSBVesselGroup
	headline = PLANE BREAKS BARRIER OF SOUND
	article = <color=#0000>(tab)</color>With the expert skills of <<1>>, <<2>> has traveled faster than sound. This experimental aircraft pushed through the immense turbulence of the transsonic region to surpass this impressive milestone. With the rate of progress at this new space program, new milestones are sure to follow.\n<color=#0000>(tab)</color>Historical Information: On October 14th, 1947, US Air Force pilot Chuck Yeager broke the sound barrier in a Bell X-1 that he nicknamed Glamorous Glennis. The rocket-powered aircraft was dropped from the bomb bay of a B-29 and acheived a speed of Mach 1.06 (361 m/s). The Soviets accomplished the feat in 1948 with a Lavochkin La-176 and the British in 1948 with a de Havilland DH.108.
	image = RP-1/Strategies/MilestoneImages/BreakSoundBarrier
}
RP0_MILESTONE
{
	name = KarmanLineMilestone
	contractName = KarmanLine
	headline = ROCKET REACHES SPACE
	article = <color=#0000>(tab)</color>A <<2>> rocket has shot out of the atmosphere and into space on a mission of scientific discovery. For the first time, rocketry is not a weapon of hostile destruction, but an instrument to further our understanding of the universe. We are all hoping that as an age of world wars ends, an age of cosmic discovery will begin and this flight marks the beginning of an era where the stars will start to seem closer and closer.\n<color=#0000>(tab)</color>Historical Information: The first real life rocket to do this was V-2 No. 3 on 10 May 1946. Launched from White Sands as part of the Hermes program, it carried a geiger counter to measure cosmic radiation. The Hermes program combined scientific and military objectives, but it still marked the first suborbital spaceflight to carry scientific instruments.
	image = RP-1/Strategies/MilestoneImages/KarmanLine
}

RP0_MILESTONE
{
	name = FirstSatelliteMilestone
	contractName = FirstSatellite
	headline = ARTIFICIAL SATELLITE ORBITS EARTH
	article = <color=#0000>(tab)</color>Far above us, a new satellite is circling the Earth: <<2>>. This satellite was put here not by mother nature, but by the hard work of a vast team of scientists and engineers. All over the world, amateur radio operators are listening to the telemetry signals it broadcasts as it passes overhead. This will go down in the history books, and it is surely only the beginning of space efforts.\n<color=#0000>(tab)</color>Historical Information: The first satellite to orbit the Earth was Sputnik, launched by the USSR on the fourth of October, 1957. It broadcast a steady radio beep as it orbited, before its batteries ran out. It stayed up for two months before drag from what little atmosphere there was up there deorbited it. This startled the US and started the Space Race.
	image = RP-1/Strategies/MilestoneImages/FirstSatellite
}

RP0_MILESTONE
{
	name = FirstSatelliteHeavyMilestone
	contractName = FirstSatellite-Heavy
	headline = ARTIFICIAL SATELLITE ORBITS EARTH
	article = <color=#0000>(tab)</color>Far above us, a new satellite is circling the Earth. This satellite was put here not by mother nature, but by the hard work of a vast team of scientists and engineers. All over the world, amateur radio operators are listening to the telemetry signals it broadcasts as it passes overhead. This will go down in the history books, and it is surely only the beginning of space efforts.\n<color=#0000>(tab)</color>Historical Information: The first satellite to orbit the Earth was Sputnik, launched by the USSR on the fourth of October, 1957. It broadcast a steady radio beep as it orbited, before its batteries ran out. It stayed up for two months before drag from what little atmosphere there was up there deorbited it. This startled the US and started the Space Race.
	image = RP-1/Strategies/MilestoneImages/FirstSatellite
}

RP0_MILESTONE
{
	name = FirstScienceSatMilestone
	contractName = FirstScienceSat
	headline = RADIATION BELTS DISCOVERED BY SATELLITE
	article = <color=#0000>(tab)</color>The first space probe to include equipment for measuring cosmic rays has revealed belts of charged particles around the Earth. Instead of circling right above us, <<2>> goes through an elaborate ballet. It shoots up to an altitude of more than a thousand kilometers before coming closer, speeding up, and then soaring back out. Due to the strange nature of orbital mechanics, this requires no energy expenditure once in motion. It slows down and speeds up purely from the laws of nature that Newton discovered almost 300 years ago.\n<color=#0000>(tab)</color>Historical Information: Explorer 1, launched by the USAF on 31 January, 1958, was the first scientific satellite. Dr. James Van Allen was in charge of the scientific instrumentation for the satellite, and so the radiation belts were named after him. Your rocket may not actually be following Newton's laws, as you need the mod "Principia" to simulate N-body gravitational interactions. For new players, the stock two-body approximation is easier to understand.
	image = RP-1/Strategies/MilestoneImages/FirstSciSat
}
RP0_MILESTONE
{
	name = FirstScienceSatHeavyMilestone
	contractName = FirstScienceSat-Heavy
	headline = RADIATION BELTS DISCOVERED BY SATELLITE
	article = <color=#0000>(tab)</color>The first space probe to include equipment for measuring cosmic rays has revealed belts of charged particles around the Earth. Instead of circling right above us, <<2>> goes through an elaborate ballet. It shoots up to an altitude of more than a thousand kilometers before coming closer, speeding up, and then soaring back out. Due to the strange nature of orbital mechanics, this requires no energy expenditure once in motion. It slows down and speeds up purely from the laws of nature that Newton discovered almost 300 years ago.\n<color=#0000>(tab)</color>Historical Information: Sputnik 3, or Object D, was the first scientific satellite launched by the Soviet Union on May 15, 1958. It was planned as the first satellite, but to ensure victory against the U.S., the Soviets elected to launch Sputnik 1 in 1957. Your rocket may not actually be following Newton's laws, as you need the mod "Principia" to simulate N-body gravitational interactions. For new players, the stock two-body approximation is easier to understand.
	image = RP-1/Strategies/MilestoneImages/FirstSciSat-Heavy
}
RP0_MILESTONE
{
	name = firstHypersonicMilestone
	contractName = XPlanesHypersonic
	screenshotContractParamName = VesselGroup
	headline = PLANE FIVE TIMES FASTER THAN SOUND
	article = <color=#0000>(tab)</color>After months of preparation, <<1>>, piloting <<2>>, was ready to do the mission the aircraft had been designed for and <<1>> has spent months training for: flying at speeds five times greater than the speed of sound. This regime of flight induces a soaring heat, requiring <<1>> to maintain a careful eye on speed, thermal load and altitude. A feat matched by no other human on Earth, only <<1>> can claim to have flown at such extreme speeds with fully manual control. \n<color=#0000>(tab)</color>Historical Information: Robert M. White was the first to pilot a North American X-15 to the speed of Mach 5.27 over the desert of California, marking the first time humans flew at hypersonic speeds (excluding re-entry).
	image = RP-1/Strategies/MilestoneImages/FirstHypersonic
}

// ============================================================================
// Uncrewed Milestones
// ============================================================================
RP0_MILESTONE
{
	name = LunarFlybyMilestone
	contractName = LunarFlyby
	headline = SPACE PROBE REACHES MOON
	article = <color=#0000>(tab)</color>For the first time, a probe manufactured on Earth has entered the gravitational influence of another celestial body. The Moon has long fascinated humanity's curiosity, from the smallest child to the most distinguished astronomer, and with the data received from this probe, our understanding will grow. This will be the first of many spacecraft to survey the Moon.\n<color=#0000>(tab)</color>Historical Information: Luna 1, launched on 4 January 1959, was the first real life probe to do this, though it was likely intended to impact the Moon. It only got within 5995 kilometers, not enough to complete the contract. It was Luna 2 that achieved this, as well as successfully impacting the Moon. 
	image = RP-1/Strategies/MilestoneImages/LunarFlyby
}
RP0_MILESTONE
{
	name = LunarImpactorMilestone
	contractName = LunarImpactor
	screenshotContractParamName = LunarImpactorAtMoonLow
	headline = ASTRONOMERS WATCH SPACECRAFT HIT MOON
	article = <color=#0000>(tab)</color>A probe from the <<2>> mission has crashed into the Moon, kicking up Moon dust that will hint at the internal composition of our closest neighbor. Humanity has literally touched another world. Anyone who looks up at the Moon can now see it not as something entirely alien, but as the foremost frontier of our exploration into the universe.\n<color=#0000>(tab)</color>Historical Information: The first real probe to do this was Luna 2, launched on 13 September 1959 by the Soviet Union. As well as scientific instruments, it carried two hollow spheres stamped all over with "USSR September 1959". They broke apart on impact, scattering the message across the lunar surface.
	image = RP-1/Strategies/MilestoneImages/LunarImpactor
}
RP0_MILESTONE
{
	name = VenusFlybyMilestone
	headline = PROBE REACHES VENUS
	article = <color=#0000>(tab)</color>The <<2>> mission has reached Venus. Sending a probe this far was a great endeavor, and we are now starting to learn about our planetary neighbor. Not too long ago, we thought that Venus might be a tropical paradise with lush jungles, but this probe corroborates recent telescope findings --- Venus is not a jungle, it is a furnace. The atmosphere is 500 degrees Celsius, well above the melting point of lead. Though it is not pleasant, it is still of scientific interest and this probe has furthered our knowledge.\n<color=#0000>(tab)</color>Historical Information: Venera 1, launched by the Soviet Union in February of 1961, was the first spacecraft to reach Venus, passing within 100,000 km. However, the probe failed due to an overheated solar-direction sensor. The first successful mission to Venus was Mariner 2, launched by the US in August of 1962 and arriving on 14 December, 1962. That is what gave that 500 degree number, as well as revealing Venus's lack of magnetic field, providing info about the content of interplanetary space, and doing some early research on solar wind.
	contractName = flybyVenus
	image = RP-1/Strategies/MilestoneImages/VenusFlyby
}
// Lunar Orbiter
RP0_MILESTONE
{
	name = LunarOrbiterMilestone
	contractName = LunarOrbiter
	headline = THE MOON HAS A NEW SATELLITE
	article = <color=#0000>(tab)</color><<2>> has become the first human-made object to orbit around the Moon. This new satellite will be used to gather information and scientists expect to learn more about the Moon from this orbiter than they have in the last 50 years.\n<color=#0000>(tab)</color>Historical Information: Luna 10 was the first human-made object to successfully orbit around another celestial body. It entered Lunar orbit on April 4, 1966, and continued to operate until May 30, 1966.
	image = RP-1/Strategies/MilestoneImages/LunarOrbiter
}
// Moon Landing
RP0_MILESTONE
{
	name = firstMoonLandingMilestone
	contractName = MoonLanding
	headline = PROBE LANDS ON MOON
	article = <color=#0000>(tab)</color>The mission controllers have exceeded themselves once more! <<2>> touched down on the Lunar surface and returned a treasure trove of data. Scientists from all over the world are racing to examine this data and use it to inform the design of an even larger amount of experiments that, as they tell us, absolutely need to fly on the next probe! \n<color=#0000>(tab)</color>Historical Information: Luna-9 was the first probe to touch down on the lunar surface on the 3rd of February, 1966. Prior to it touching down, there was significant uncertainty as to whether or not the surface could support Luna 9's weight - but the surface was proven to be solid. 
	image = RP-1/Strategies/MilestoneImages/MoonLanding
}
// Mars Landing
RP0_MILESTONE
{
	name = firstMarsLandingMilestone
	contractName = landingMars
	headline = PROBE LANDS ON MARS
	article = <color=#0000>(tab)</color>Scientists around the world are ecstatic! They have received the first telemetry from the surface of the Red Planet. Flying through the thin Martian atmosphere, <<2>> has successfully touched down securely on the surface! The data streaming back will change our understanding of Mars for decades to come - is life possible? Is there life on Mars? We will know soon! \n<color=#0000>(tab)</color>Historical Information: The Soviet probe Mars 3 was the first spacecraft to make a soft landing on Mars on December 2, 1971, though it ceased transmissions after 14.5 seconds. The US Viking 1 was the first to successfully perform a long-duration mission on the surface in July 1976.
	image = RP-1/Strategies/MilestoneImages/MarsLanding
}
// Venus Landing
RP0_MILESTONE
{
	name = firstVenusLandingMilestone
	contractName = landingVenus
	headline = PROBE SURVIVES VENUSIAN SURFACE
	article = <color=#0000>(tab)</color>A testament to our material scientists - <<2>> has pierced through the dense, hellish clouds of the Venusian atmosphere - and made it through, landing successfully! Whereas our probe will succumb to the conditions on the surface of the planet before the day's end, the data we will receive from it will be invaluable.\n<color=#0000>(tab)</color>Historical Information: Venera 7, launched by the Soviet Union, was the first spacecraft to soft-land on another planet and transmit data back to Earth on December 15, 1970. It broadcasted temperature data from the surface for 23 minutes before succumbing to the heat and pressure.
	image = RP-1/Strategies/MilestoneImages/VenusLanding
}
// Jupiter Flyby
RP0_MILESTONE
{
	name = JupiterFlybyMilestone
	contractName = flybyJupiter
	headline = PROBE REACHES JUPITER
	article = <color=#0000>(tab)</color>We sent them out to the planets, to worlds beyond our own, where frail men dared not venture - and <<2>> ventured on alone! But it crossed that vast expanse after Mars and reached Jupiter, shooting past it at unthinkably high speeds! The scientific data now streaming into the antennas of the space agency are eagerly awaited from scientists around the world - if only we could orbit! \n<color=#0000>(tab)</color>Historical Information: Pioneer 10 was the first spacecraft to fly past Jupiter, making its closest approach on December 3, 1973. It provided the first close-up images of the planet and discovered its immense magnetic tail.
	image = RP-1/Strategies/MilestoneImages/JupiterFlyby
}
// Jupiter Orbit
RP0_MILESTONE
{
	name = JupiterOrbitMilestone
	contractName = orbitJupiter
	headline = JUPITER HAS A NEW MOON
	article = <color=#0000>(tab)</color>Firing its braking engine to shed immense velocity, <<2>> has successfully captured into orbit around Jupiter. Rather than a brief flyby, this spacecraft will now spend years observing the Jovian system, mapping its intricate storms and studying its diverse array of moons.\n<color=#0000>(tab)</color>Historical Information: NASA's Galileo spacecraft was the first to orbit Jupiter, arriving on December 7, 1995. It studied the planet and its moons for nearly eight years, notably finding evidence of a subsurface ocean on Europa.
	image = RP-1/Strategies/MilestoneImages/JupiterOrbit
}
// Saturn Flyby
RP0_MILESTONE
{
	name = SaturnFlybyMilestone
	contractName = flybySaturn
	headline = PROBE REACHES SATURN
	article = <color=#0000>(tab)</color>The stunning rings of Saturn have been seen up close for the very first time as the <<2>> mission streaks past the gas giant. Navigating the hazardous ring plane, the probe is returning data that reveals the complex structure of the rings and the composition of Saturn's atmosphere. Scientists and authors alike are incredibly thrilled to see the data return from that distant planet!\n<color=#0000>(tab)</color>Historical Information: Pioneer 11 was the first probe to encounter Saturn, passing within 21,000 km of the planet's cloud tops on September 1, 1979. It discovered the narrow F ring and a new moon.
	image = RP-1/Strategies/MilestoneImages/SaturnFlyby
}
// Saturn orbit
RP0_MILESTONE
{
	name = SaturnOrbitMilestone
	contractName = orbitSaturn
	headline = SPACECRAFT ENTERS SATURN ORBIT
	article = <color=#0000>(tab)</color>We sent them out to the planets, to worlds beyond our own, where frail men dared not venture - and <<2>> ventured on alone! And it passed Jupiter's orbit and reached Saturn without a hitch! With the sun dim behind them, the probe sits on a unique perch from which it can view the rest of the Solar System. \n<color=#0000>(tab)</color>Historical Information: The Cassini-Huygens mission became the first to enter orbit around Saturn on July 1, 2004. Over its 13-year orbital mission, it revolutionized our understanding of the Saturnian system, including the complex hydrocarbon lakes on Titan and water plumes on Enceladus.
	image = RP-1/Strategies/MilestoneImages/SaturnOrbit
}

// ============================================================================
// Crewed Milestones
// ============================================================================
// Crewed Orbit
RP0_MILESTONE
{
	name = firstOrbitCrewedMilestone
	contractName = first_OrbitCrewed
	screenshotContractParamName = FirstCrewedOrbitWrapper
	headline = "I CAN SEE EVERYTHING," SAYS FIRST HUMAN IN ORBIT
	article = <color=#0000>(tab)</color>Sitting atop a pillar of fuel, <<1>> had a fire lit under them and was shot into space, becoming the first human to enter into an orbit around Earth. Piloting the <<2>> spacecraft, the young astronaut experienced a full orbit of our planet in only 90 minutes. They commented "I can see everything. As I look down at the Earth, I can say there is no greater beauty I have ever experienced. This is a wonderful planet. The lights of the cities at night, the fields, the deserts, the oceans, the mountains. It all shows the vast wonder of nature and the amazing efforts we have taken to make our place in it. We must protect this great planet." When the time came, <<1>> fired the craft's retro rockets and safely landed back on Earth.\n<color=#0000>(tab)</color>Historical Information: Yuri Gagarin was the first human in space, accomplishing that feat on April 12, 1961. Vostok 1 was launched from Baikonur Cosmodrome, orbited the Earth one time with the flight lasting a total of 108 minutes.
	image = RP-1/Strategies/MilestoneImages/FirstCrewedOrbit
}
// Docking
RP0_MILESTONE
{
	name = firstDockingMilestone
	contractName = first_Docking
	headline = TWO SPACECRAFT DOCK IN ORBIT
	article = <color=#0000>(tab)</color>A key requirement for space stations and certain Lunar Landing architectures has been demonstrated - docking! This is critical, as without the certification of docking capabilities, there is no way for mission planners to know what can be done and what cannot, as well as how easy it is to do so. But <<1>> made it look like no problem at all when docking <<2>> to its target!\n<color=#0000>(tab)</color>Historical Information: Gemini 8, piloted by Neil Armstrong and David Scott, achieved the first orbital docking on March 16, 1966, linking with an uncrewed Agena target vehicle.
	image = RP-1/Strategies/MilestoneImages/FirstDocking
}
// EVA
RP0_MILESTONE
{
	name = firstEVAMilestone
	contractName = first_EVA
	headline = ASTRONAUT STEPS INTO THE VOID
	article = <color=#0000>(tab)</color>Are you scared of heights? Yes? Then you should rejoice that you were not on the most recent flight of <<2>>! Standing many kilometres over Earth's surface, <<1>> looked out and took a step - leaving the safety of the capsule! They have described it as the most beautiful vista they have ever seen!\n<color=#0000>(tab)</color>Historical Information: Alexei Leonov conducted the first EVA on March 18, 1965, during the Voskhod 2 mission, spending 12 minutes outside the spacecraft.
	image = RP-1/Strategies/MilestoneImages/FirstEVA
}
// Moon Flyby
RP0_MILESTONE
{
	name = firstCrewedLunarFlybyMilestone
	contractName = first_MoonFlybyCrewed
	headline = HUMANS LEAVE EARTH
	article = <color=#0000>(tab)</color>Oh, they have slipped the surly bonds of Earth indeed! <<1>> piloted the <<2>> spacecraft to the Moon! Using handheld cameras, beautiful pictures of the Earth rising above the Lunar surface have been taken - or at least the crew claims that to be the case! The next step is certain: orbit and then a landing!\n<color=#0000>(tab)</color>Historical Information: Apollo 8, crewed by Frank Borman, James Lovell, and William Anders, became the first crewed spacecraft to leave low Earth orbit and reach the Moon in December 1968, though they captured into orbit rather than flying a free-return trajectory.
	image = RP-1/Strategies/MilestoneImages/CrewedLunarFlyby
}
// Moonboots
RP0_MILESTONE
{
	name = firstCrewedLunarLandingMilestone
	contractName = first_MoonLandingCrewed
	headline = HUMANS TO THE MOON AND BACK
	article = <color=#0000>(tab)</color>Hundreds of millions of humans have crowded around radios and televisions around Earth, listening in on the broadcast from Mission Control. As the crew lit the descent engine on <<2>>, millions started holding their breaths. But contact light was confirmed! Humans have left Earth and touched the face of another celestial body! Humans have walked on the Moon! A bleak, rocky world is seen from the landing module. The crew has steered their fragile lander safely and smoothly to the historic landing. <<1>> says that the view out of the capsule window is the most beautiful thing they have ever seen.\n<color=#0000>(tab)</color>Historical Information: Apollo 11, with astronauts Neil Armstrong and Buzz Aldrin, achieved the first crewed lunar landing on July 20, 1969.
	image = RP-1/Strategies/MilestoneImages/CrewedMoonLanding
}
// Moonboots direct
RP0_MILESTONE
{
	name = firstCrewedLunarLandingDirectMilestone
	contractName = first_MoonLandingCrewedDirect
	headline = HUMANS TO THE MOON AND BACK
	article = <color=#0000>(tab)</color>Hundreds of millions of humans have crowded around radios and televisions around Earth, listening in on the broadcast from Mission Control. As the crew lit the descent engine on <<2>>, millions started holding their breaths. But contact light was confirmed! Humans have left Earth and touched the face of another celestial body! Humans have walked on the Moon! A bleak, rocky world is seen from the landing module. The crew has steered their fragile lander safely and smoothly to the historic landing. <<1>> says that the view out of the capsule window is the most beautiful thing they have ever seen.\n<color=#0000>(tab)</color>Historical Information: Apollo 11, with astronauts Neil Armstrong and Buzz Aldrin, achieved the first crewed lunar landing on July 20, 1969.
	image = RP-1/Strategies/MilestoneImages/CrewedMoonLanding
}
// Station
RP0_MILESTONE
{
	name = firstStationMilestone
	contractName = first_spaceStation
	headline = ORBITAL OUTPOST ESTABLISHED
	article = <color=#0000>(tab)</color>Humans have ventured out into space for short periods - but now, we are there to stay! The newly established orbital outpost will allow humans to spend weeks in orbit around Earth! Soon, there will be outposts on the Moon and Mars - an interplanetary society is on the way!\n<color=#0000>(tab)</color>Historical Information: Salyut 1, launched by the Soviet Union on April 19, 1971, was the first space station. The Soyuz 11 crew successfully boarded it in June 1971, staying for 22 days.
	image = RP-1/Strategies/MilestoneImages/FirstStation
}
// 2 week moon
RP0_MILESTONE
{
	name = 2WeekStayMilestone
	contractName = MoonLandingCrew2Week
	headline = EXTENDED LUNAR EXPEDITION CONCLUDES
	article = <color=#0000>(tab)</color>The short term, multi-day missions to the Lunar surface are a thing of the past! Humans have spent two weeks on the surface of the Moon, more than the total duration spent on all previous missions! And as the agency assures us - they are only planning on staying there for even longer! \n<color=#0000>(tab)</color>Historical Information: The longest historical Apollo stay was Apollo 17 in December 1972, lasting just over 3 days (75 hours) on the surface.
	image = RP-1/Strategies/MilestoneImages/MoonBase
}
// 6 month moon
RP0_MILESTONE
{
	name = 6MonthLunarStayMilestone
	contractName = MoonLandingCrew6Month
	headline = HALF A YEAR ON THE MOON
	article = <color=#0000>(tab)</color>The Moon has been settled! No mere short term vacations - we are there to stay! A six month stay on the Lunar surface has been completed\n<color=#0000>(tab)</color>Historical Information: You have exceeded history! There were proposals to use Apollo hardware to do so, such as the Lunar Exploration System for Apollo proposal studied by NASA in June of 1968. 
	image = RP-1/Strategies/MilestoneImages/MoonBase
}
// Mars Flyby
RP0_MILESTONE
{
	name = firstCrewedMarsFlybyMilestone
	contractName = first_MarsFlybyCrewed
	headline = HUMANS FLY PAST MARS AND RETURN
	article = <color=#0000>(tab)</color>We sent probes into space. We sent crew into space. We sent crew to the Moon. And now, we have sent them to another planet! Flying past Mars, the crew of <<2>> reports seeing the Red Planet fill their viewports.\n<color=#0000>(tab)</color>Historical Information: There have been dozens of proposals for sending humans to Mars, but so far, none have been executed.
	image = RP-1/Strategies/MilestoneImages/CrewedMarsLanding
}
// Mars Orbit
RP0_MILESTONE
{
	name = firstCrewedMarsOrbitMilestone
	contractName = FirstCrewedMarsOrbit
	headline = CREW BACK FROM MARS ORBIT
	article = <color=#0000>(tab)</color>Humans have left the embrace of our Cradle and been captured by the gravity field of another planet! From their perched view, the crew of <<2>> is reporting seeing countless landmarks of the Martian surface, with each more beautiful than the last!\n<color=#0000>(tab)</color>Historical Information: There have been dozens of proposals for sending humans to Mars but so far, none have been executed.
	image = RP-1/Strategies/MilestoneImages/CrewedMarsLanding
}
// Marsboots
RP0_MILESTONE
{
	name = firstCrewedMarsLandingMilestone
	contractName = FirstCrewedMarsLanding
	headline = HUMANS LAND ON MARS
	article = <color=#0000>(tab)</color><<1>> is the first human to walk on another planet! After a smooth performance by <<2>> on its descent through the Martian atmosphere, the crew performed perfectly. With Mission Control so far away and a noticeable time delay, the crew had to rely on their skill and the vehicle's computers to perform such a historical feat! \n<color=#0000>(tab)</color>Historical Information: There have been dozens of proposals for sending humans to Mars, but so far, none have been executed.
	image = RP-1/Strategies/MilestoneImages/CrewedMarsLanding
}

// Future ones could be spaceplanes, etc. - but those depend on PRs that can add that themselves

// ============================================================================
// Commercial Milestones
// ============================================================================
// GEO
RP0_MILESTONE
{
	name = FirstGEOSatMilestone
	contractName = FirstGEOSat-SCA
	headline = ADVANCED MANEUVERING FREEZES SATELLITE IN THE SKY
	article = <color=#0000>(tab)</color>By synchronizing the orbit of the spacecraft with the Earth's rotation, the satellite seems to hang still in space, 35,786 kilometers above us. While staying still may sound easy, this required perfect alignment of the satellite's orbit through months of work. This allows easy alignment of ground-based communications equipment and will make possible new forms of communication.\n<color=#0000>(tab)</color>Historical Information: The concept of a geostationary satellite was proposed in 1929, and later popularized by Arthur C. Clarke. The first operational satellite to reach this orbit was Syncom 3, launched by the US on August 19, 1964. Today, we use geostationary orbits for communications, weather, and navigation satellites.
	image = RP-1/Strategies/MilestoneImages/FirstGEOSat
}
// ============================================================================
// Misc. Milestones
// ============================================================================
// KIA
RP0_MILESTONE
{
	name = CrewKilledMilestone
	headline = ASTRONAUTS KILLED DURING SPACE MISSION
	article = <color=#0000>(tab)</color>The world grieves at the loss of <<and(3,10)>>, killed in a tragic accident. They will be mourned by their comrades, missed by their country, and remembered by everyone on Earth, a planet that dared to look to the stars. Though they would have wished for the program to continue, there are many now questioning if space travel is worth the risk. This accident must have been preventable. All of the engineers and scientists at the program have taken a short break to mourn, but when they return to work on new satellites and new missions it will be with heavy hearts.\n<color=#0000>(tab)</color>In memory of: Valentin Bondarenko, Theodore Freeman, Elliot See, Charles Bassett, Virgil "Gus" Grissom, Ed White, Roger Chaffee, Vladimir Komarov, Clifton C. Williams, Michael J. Adams, Robert Henry Lawrence Jr, Georgy Dobrovolsky, Viktor Patsayev, Vladislav Volkov, Gregory Jarvis, Christa McAuliffe, Ronald McNair, Ellison Onizuka, Judith Resnik, Michael J. Smith, Dick Scobee, Sergei Vozovikov, Rick D. Husband, William C. McCool, Michael P. Anderson, David M. Brown, Kalpana Chawla, Laurel Clark, Ilan Ramon, and Michael Alsbury.
	image = RP-1/Strategies/MilestoneImages/Memorial
	canRequeue = true
}