// Aerodynamic Coefficient Identification Package - check


// ============================================================================
// Shuttle Imaging Radar
// ============================================================================
EXPERIMENT_DEFINITION
{
	id = RP0ShuttleImagingRadar
	title = Spaceplane Imaging Radar
	baseValue = 50 //Placeholder
	scienceCap = 50 //Placeholder
	dataScale = 50 //Placeholder
	requireAtmosphere = False
	situationMask = 16 //Space Low
	biomeMask = 0
	description = 
	mass = 0.317	// 317kg
	techRequired = spaceShuttles
	cost = 0
	tags = spaceShuttles
	minCrew = 2
	celestialBodies = Earth
	situations = ORBITING
	RESULTS
	{
		default = 
	}
	KERBALISM_EXPERIMENT
	{
		// sample mass in tons. if undefined or 0, the experiment produce a file
		SampleMass = 0
		// Body restrictions, multiple lines allowed (just don't use conflicting combinations).
		BodyAllowed = Earth
		IncludeExperiment = RP0ShuttleImagingRadar
	}
}
@PART[*]:HAS[#capsuleTier[SpaceCockpit]]:FOR[zzzKerbalism]
{
	MODULE
	{
		name = Experiment
		experiment_id = RP0ShuttleImagingRadar
		ec_rate = 0.2 // 200 W,peak of 1kW but that is excessive
		data_rate = 50 //Placeholder
		@data_rate /= 172800 //2 Days
		requires = CrewMin:2 // STS-2
		resources = 
		crew_operate = 
		hide_when_unavailable = True
	}
}

