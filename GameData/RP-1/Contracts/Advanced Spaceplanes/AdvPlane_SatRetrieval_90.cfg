CONTRACT_TYPE
{
	name = AdvPlane_SatRetrieval_90
	title = Satellite Retrieval (90° Inclination)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</b><br><br>We have been approached by a telecommunications company, or more accurately, their insurance company. Their new communications satellite has suffered an anomaly and needs to be recovered - and that task has fallen to us and our reliable spaceplane.

	synopsis = Capture a derelict satellite and return it to Earth.

	completedMessage = Outstanding! The satellite has been recovered and returned safely to the ground.

	sortKey = 418

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 270
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	// ************ BACKGROUND VESSEL ************
	BEHAVIOUR
	{
		name = SpawnRetrievalTarget
		type = SpawnVessel

		VESSEL
		{
			name = DerelictSat_90
			craftPart = RP-1-CommunicationSat
			vesselType = Probe
			owned = false

			ORBIT
			{
				SMA = 6671000
				ECC = 0.005
				INC = Random(88,92)
				LAN = Random(0, 360)
				LPE = 90
				MNA = 0
				EPH = 0
				REF = 1
			}
		}
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = RetrievalMission
		type = VesselParameterGroup
		title = Satellite Retrieval Operations
		define = RetrievalVessel
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasKlaw
			type = PartValidation
			part = GrapplingDevice
			title = Vessel must have a grabbing unit
			hideChildren = true
			targetBody = @/targetBody
		}


		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			title = Reach orbit
			disableOnStateChange = true
			hideChildren = true
		}

		PARAMETER
		{
			name = CaptureTarget
			type = Docking
			vessel = DerelictSat_90
			title = Capture the derelict satellite
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with the satellite — descent angle lower than 10 degrees
		vessel = RetrievalVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = RetrievalVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	// ************ CLEANUP ************
	BEHAVIOUR
	{
		name = CleanupDerelict
		type = DestroyVessel
		onState = CONTRACT_FAILED
		vessel = DerelictSat_90
	}
}