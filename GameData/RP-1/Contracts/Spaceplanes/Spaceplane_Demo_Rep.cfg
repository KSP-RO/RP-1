CONTRACT_TYPE
{
	name = Spaceplane_Demo_Rep
	title = Suborbital Research Spaceplane Flight
	group = EarlySpacePlanes

	description = <b>Program: Early Space Planes<br>Type: <color=blue>Optional</color></b><br><br>Crewed suborbital flights are used as a safer prelude to an orbital mission, for research, or to set non-orbital altitude records. Send any number of crew above 160 kilometers and land on the runway to satisfy the requirements of this mission. Historical missions used the X-15 (1963, B-52), and SpaceShipOne (2004, White Knight).<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>&br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b>
	
	genericDescription = Launch a crewed spaceplane with at least one person aboard above the required height and return safely home to a runway landing.

	synopsis = Send a crewed spaceplane on a suborbital flight

	completedMessage = Congratulations! The crew has landed safely and we put another person in space.

	sortKey = 602

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 3
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()


	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 90 // 1.5x capsule 
	failureReputation = 0 

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = EarlySpacePlanes
	}
	
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = Spaceplane_Demo
	}
	
	BEHAVIOUR
    {
        name = IncrementTheCount
        type = Expression
        CONTRACT_OFFERED
        {
            SpaceplaneDemoRep_Count = $SpaceplaneDemoRep_Count + 0
        }
        CONTRACT_COMPLETED_SUCCESS
        {
            SpaceplaneDemoRep_Count = $SpaceplaneDemoRep_Count + 1
        }
    }

	DATA
    {
        type = List<float>
        altitudesKm = [ 160, 180, 200 ]
    }

	DATA
    {
        type = int
        index = $SpaceplaneDemoRep_Count + 0
    }

	DATA
    {
        type = float
        altitudeKm = @altitudesKm.ElementAt(@index)
    }

	// ************ PARAMETERS ************
	
	PARAMETER
    {
        name = VesselGroup
        type = VesselParameterGroup
        title = Suborbital flight
        define = Spaceplane
        dissassociateVesselsOnContractCompletion = true

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }
        PARAMETER
        {
            name = OneCrew
            type = HasCrew
            minCrew = 1
            crewOnly = true
            title = Have at least 1 crewmember on board
            hideChildren = true
        }
        PARAMETER
        {
            name = ReachAlt
            type = ReachState
            minAltitude = @/altitudeKm * 1000
            disableOnStateChange = true
            title = Reach @/altitudeKm km
            hideChildren = true
        }
    }

    PARAMETER
    {
        name = LandingVesselGroup
        type = VesselParameterGroup
        title = Land with a descent angle lower than 10 degrees
        vessel = Spaceplane
        hideChildren = true

        PARAMETER
        {
            name = HorizontalLanding
            type = HorizontalLanding
            descentAngle = 10
            hideChildren = true
            completeInSequence = true
        }

        PARAMETER
        {
            name = ReturnHome
            type = RP1ReturnHome
            maxSpeed = 5
            hideChildren = true
            completeInSequence = true
        }
    }

    PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = Spaceplane
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}
