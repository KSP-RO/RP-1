CONTRACT_TYPE
{
	name = mapTriton
	title = Triton Mapper
	group = NeptuneMoonExploration


	description = <b>Program: Neptunian Moon Landings<br>Type: <color=green>Required</color></b><br><br>In preparation for our landing on Triton, we should send a dedicated probe to map the moon. 
	genericDescription = Achieve orbit around Triton and transmit science.

	synopsis = Achieve an orbit around Triton and transmit science

	completedMessage = Mission Success! We have a much better understanding of Triton now! 

	sortKey = 713

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	targetBody = Triton

	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 600
	failureReputation = 0 // was @rewardReputation


    // ************ DATA ************
	DATA
	{
		type = double
		orbitKM = Round((@targetBody.Radius() * 2) / 1000)
		title = Get Minimum Orbit Height
	}
	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = NeptuneMoonExploration
	}

	// ************ PARAMETERS ************

	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Orbit Triton
		define = OrbitTriton

		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Uncrewed
			hideChildren = true
		}
		PARAMETER
		{
			name = EnterOrbit
			type = Orbit
			situation = ORBITING
			maxPeA = @targetBody.Radius() * 2
			disableOnStateChange = true
			title = Orbit Triton with a maximum periapsis of @/orbitKM km
			
			PARAMETER
			{
				name = Duration
				type = Duration

				duration = 2m

				preWaitText = Check for stable orbit
				waitingText = Checking for stable orbit
				completionText = Stable orbit: Confirmed
			}
		}
	}
	PARAMETER
	{
		name = Visible Imager
		type = RP1CollectScience
		targetBody = Moon
		experiment = RP0visibleImaging5
		situation = InSpaceLow
		fractionComplete = 0.5
		fractionCompleteBiome = 0.9
		minSubjectsToComplete = 4
		title = Collect at least 60% total Video Imaging 5 science from low space around Triton, and complete 90% in each of 4 lunar biomes.
	}
	PARAMETER
	{
		name = Infrared Radiometer
		type = RP1CollectScience
		targetBody = Moon
		experiment = RP0infraredRad4
		situation = InSpaceLow
		fractionComplete = 0.5
		fractionCompleteBiome = 0.9
		minSubjectsToComplete = 4
		title = Collect at least 60% total Infrared Radiometer 4 science from low space around Triton, and complete 90% in each of 4 lunar biomes.
	}
}