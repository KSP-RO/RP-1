CONTRACT_TYPE
{
    name = InterstellarProbe
    group = InterstellarProbes

    title = Interstellar Probe
    genericTitle = Interstellar Probe
    description = <b>Program: Interstellar Probes<br>Type: <color=green>Required</color></b><br><br> Our probes have explored all there is to explore in the Solar System. We have reached the apex of uncrewed exploration: sending a probe out into interstellar space with sufficiently high velocity to reach the interstellar medium in a reasonable time frame.
    genericDescription = Reach 40 AU from the Sun at a minimum velocity of 60 km/s.
    completedMessage = Telemetry confirmed. The probe has crossed the 40 AU mark at the target velocity. Godspeed, our brave robotic explorer!
    synopsis = Launch a probe that reaches an altitude of 40 AU from the Sun while maintaining a heliocentric speed of at least 60 km/s.

    sortKey = 998

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
    deadline = 0
    cancellable = true
    declinable = true
    autoAccept = false
    
    targetBody = Sun

    // ************ REWARDS ************
    prestige = Exceptional 
    advanceFunds = 0
    rewardScience = 0
    rewardFunds = 0
    failureFunds = 0
    rewardReputation = 10000
    failureReputation = 0

    // ************ REQUIREMENTS ************

    REQUIREMENT
    {
        name = ProgramActive
        type = ProgramActive
        program = InterstellarProbes
    }
    
    // ************ DATA ************
    DATA
    {
        type = float
        targetAU = 40.0
    }
    
    DATA
    {
        type = float
        targetVelocityKmS = 60.0
    }
    
    // Convert from AU to Metres
    DATA
    {
        type = double
        auToMeters = 149597870700.0
    }

    PARAMETER
    {
        name = MissionParameters
        type = VesselParameterGroup
        title = Reach @/targetAU AU from the Sun at >= @/targetVelocityKmS km/s

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = BuiltAtVAB
            type = VesselBuiltAt
            builtAt = VAB
        }

        PARAMETER
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }

        PARAMETER
        {
            name = ReachTargetState
            type = ReachState
            minAltitude = @/targetAU * @/auToMeters
            minSpeed = @/targetVelocityKmS * 1000
            disableOnStateChange = true
            title = Reach a distance of at least @/targetAU AU from the Sun with a velocity of at least @/targetVelocityKmS km/s
        }
    }
}