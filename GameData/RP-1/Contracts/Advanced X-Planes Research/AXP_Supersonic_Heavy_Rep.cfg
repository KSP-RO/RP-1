CONTRACT_TYPE
{
	name = AXP_Supersonic_Heavy_Rep
	group = AdvXPlanes
	title = Supersonic Heavy Transport - Repeatable
	description = FIXME
	synopsis = Fly a crewed jet aircraft @/missionPayload.ElementAt(@/index).Print() units of Research Payload to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight and hold, then return safely.
	completedMessage = Congratulations on a successful flight!
	sortKey = 4506
	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0
	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 150
	failureReputation = 0
	supportsPreview = true

	// ************* REQUIREMENTS ****************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvXPlanes
		targetBody = @/targetBody
	}
	DATA
	{
		type = int
		index = 0
	}
	DATA
	{
		type = List<float>
		missionPayload = [ 30000, 35000, 40000, 45000 ]
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AXP_Supersonic_Heavy
		targetBody = @/targetBody
	}
	PARAMETER
	{
		name = VesselGroup
		type = VesselParameterGroup
		title = Maintain between @HoldSituation/minSpeed m/s and @HoldSituation/maxSpeed m/s in level flight with an uncrewed jet aircraft.
		define = supersonicCraft
		dissassociateVesselsOnContractCompletion = true
		resetChildrenWhenVesselDestroyed = true
		targetBody = @/targetBody
		PARAMETER
		{
			name = BuiltAtSPH
			type = VesselBuiltAt
			builtAt = SPH
			targetBody = @/targetBody
		}
		PARAMETER
		{
			name = NoRocket
			type = PartValidation
			title = Vessel is a jet (no rocket engines allowed)
			hideChildren = true
			targetBody = @/targetBody
			NONE
			{
				partModule = ModuleEnginesRF
				partModule = ModuleEnginesAJEPropeller
			}
		}
		PARAMETER
		{
			name = HasSoundingPayload
			type = HasResource
			resource = ResearchPayload
			minQuantity = @/missionPayload.ElementAt(@/index) - 0.1
			title = Have a ResearchPayload of at least @/missionPayload.ElementAt(@/index).Print() units on the craft
			hideChildren = true
			targetBody = @/targetBody
		}
		PARAMETER
		{
			name = HoldSituation
			type = ReachState
			minSpeed = 650
			maxSpeed = 815
			minRateOfClimb = -50
			maxRateOfClimb = 50
			situation = FLYING
			title = Hold between @minSpeed m/s to @maxSpeed m/s in level flight.
			disableOnStateChange = true
			targetBody = @/targetBody
			PARAMETER
			{
				name = Duration
				type = Duration
				duration = 20m
				preWaitText = Reach specified speed.
				waitingText = Testing highspeed flight
				completionText = Flight completed.
				targetBody = @/targetBody
			}
		}
	}
}