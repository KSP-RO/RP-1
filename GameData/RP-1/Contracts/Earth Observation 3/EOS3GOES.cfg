CONTRACT_TYPE
{
    name = EOS3GOES
    title = Geostationary Operational Environmental Satellite
    group = EOS3
    agent = Federation Aeronautique Internationale
    
    description = <b>Program: Operational Earth Observation<br>Type: <color=green>Required</color></b><br><br>Polar satellites only see a location twice a day. To predict severe storms and hurricanes effectively, we need continuous monitoring of the entire hemisphere.<br><br>Launch a satellite into a Geostationary Orbit to provide real-time weather tracking.<br><br><b><color="green">Make sure your craft contains a Two-Channel Infrared Radiometer and an Improved TV Camera.</color></b><br><br>Historical example: SMS-1 / GOES-1.

    synopsis = Launch the first Geostationary Weather Satellite.

    completedMessage = Success! We are receiving the first full-disk images of the Earth.

    sortKey = 504

    cancellable = true
    declinable = false
    autoAccept = false
    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1
    maxSimultaneous = 1
    deadline = 0

    targetBody = HomeWorld()

    // ************ REWARDS ************
    prestige = Significant
    advanceFunds = 0
    rewardScience = 0
    rewardFunds = 0
    failureFunds = 0
    rewardReputation = 250
    failureReputation = 0 

    // ************ REQUIREMENTS ************

    REQUIREMENT
    {
        name = ProgramActive
        type = ProgramActive
        program = EarthObservationScience3
    }

    PARAMETER
    {
        name = GOES
        type = VesselParameterGroup
        title = GOES Satellite

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new vessel
            hideChildren = true
        }
        PARAMETER 
        {
            name = Crewmembers
            type = HasCrew
            minCrew = 0
            maxCrew = 0
            title = Uncrewed
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitSequence
            type = Sequence
            title = Survive in orbit for 7 days

            PARAMETER
            {
                name = HasPower
                type = HasResource
                resource = ElectricCharge
                minQuantity = 1.0
                title = Craft must have Electric Charge
                hideChildren = true
            }
            
            PARAMETER
            {
                name = SciencePayload
                type = VesselParameterGroup
                title = Carry the required science instrumen            
                PARAMETER
                {
                    name = HasExperiment1
                    type = RP1HasExperiment
                    experiment = RP0infraredRad3
                }
                PARAMETER
                {
                    name = HasExperiment2
                    type = RP1HasExperiment
                    experiment = RP0visibleImaging3
                }
            }


            PARAMETER
            {
                name = Orbit
                type = Orbit
                title = Reach a Geostationary Orbit                
                minPeriod = 23h 55m 0s
                maxPeriod = 23h 57m 0s
                
                maxEccentricity = 0.01  // Circular
                maxInclination = 5.0    // Equatorial
                
                disableOnStateChange = true
            }

            PARAMETER
            {
                name = Duration
                type = Duration
                duration = 7d
                preWaitText = Check for stable orbit
                waitingText = Checking for stable orbit
                completionText = Stable orbit: Confirmed
            }
        }
    }
}