// ============================================================================
// Short-Term Lunar Habitation
// ============================================================================
EXPERIMENT_DEFINITION
{
	id = RP0LunarHabit1
	title = Short-Term Lunar Habitation
	baseValue = 120 
	scienceCap = 120
	dataScale = 8
	requireAtmosphere = False
	situationMask = 1 
	biomeMask = 0
	description = To analyze the health of humans living on the Moon over weeks. This experiment takes 14 days and consumes 350L of Research Payload
	mass = 0
	techRequired = advancedUncrewedLanding 
	cost = 0
	tags = advancedUncrewedLanding
	minCrew = 2
	celestialBodies = Moon
	situations = LANDED
	RESULTS
	{
		default = Through prolonged habitation on the lunar surface, we have learned about various physical and psychological health effects 
	}
	KERBALISM_EXPERIMENT
	{
		// sample mass in tons. if undefined or 0, the experiment produce a file
		SampleMass = 0
		BodyAllowed = Moon
		IncludeExperiment = 
	}
}
@PART[*]:HAS[#lunarBaseTier[ProtoLunarBase]]:FOR[zzzKerbalism]
{
	MODULE
	{
		name = Experiment
		experiment_id = RP0LunarHabit1
		ec_rate = 0.1 
		data_rate = 8 
		@data_rate /= 1209600 //14d
		requires = CrewMin:2
		resources = ResearchPayload@0.00028935 //Consumes 0.35T of payload every 14 days. The unit here is per second.
		crew_operate = True
		hide_when_unavailable = True
	}
}

