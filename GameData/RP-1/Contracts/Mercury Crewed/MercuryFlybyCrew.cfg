CONTRACT_TYPE
{
	name = Crewed_Mercury_flyby
	title = Flyby Mercury (Crewed)
	group = CrewedMercuryExp
	agent = Exploration

	description = <color=green>Required</color> We have sent uncrewed missions to our neighboring planet, Mercury, but now we want to send Humans to explore. Design, build and launch a mission that sends at least Three humans on a flyby of Mercury and return them home safely to Earth.

	synopsis = Send a crewed vessel on a flyby of Mercury

	completedMessage = Congratulations! Humans have laid their own eyes on Mercury for the first time!

	sortKey = 2031

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 0
	maxSimultaneous = 1
	deadline = 0

	targetBody = Mercury


// ************ REWARDS ************
	prestige = Trivial   
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 0
	rewardFunds = 500
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedMercuryExp
	}

	PARAMETER
	{
		name = FlybyCrew
		type = VesselParameterGroup
		title = Flyby Mercury
		define = FlybyMercuryCrew

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = Crewmembers
			type = HasCrew
			minCrew = 3
			title = Have at least 3 Crewmembers
			hideChildren = true
		}
		PARAMETER
		{
			name = FlybyPlanet
			type = ReachState
			maxAltitude = 200000
			disableOnStateChange = true
			title = Flyby Mercury within 200,000 km
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
	PARAMETER
	{
		name = CollectScience
		type = CollectScience
		recoveryMethod = RecoverOrTransmit
		title = Return Science from your flyby of Mercury
		hideChildren = true
	}
}
