CONTRACT_TYPE
{
	name = AdvPlane_SatMaintenance_60
	title = Spaceplane Satellite Maintenance (60° Inclination)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale	
	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</color></b><br><br>We have been approached by a telecommunications company - their satellite is stranded in orbit! We have agreed to send one of our spaceplanes up, rendezvous with it and perform a close inspection, before returning home. 	
	synopsis = Rendezvous with the target satellite in LEO and return to Earth.	
	completedMessage = Maintenance complete. The satellite is back online and your vessel has returned successfully.	
	sortKey = 410	
	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0	
	targetBody = HomeWorld()	
	
	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 40
	failureReputation = 0	

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

	// ************ BACKGROUND VESSEL ************
	BEHAVIOUR
	{
		name = SpawnTargetSatellite
		type = SpawnVessel	
		VESSEL
		{
			name = CommSat-60
			craftPart = RP-1-CommunicationSat
			vesselType = Probe
			owned = false	
			ORBIT
			{
				SMA = 6771000
				ECC = 0.005
				INC = Random(58,62)
				LAN = Random(0,360)
				LPE = 90
				MNA = 0
				EPH = 0
				REF = 1
			}
		}
	}	
	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = MaintenanceMission
		type = VesselParameterGroup
		title = Spaceplane Maintenance Operations
		define = SpaceplaneVessel
		completeInSequence = true	
		PARAMETER
		{
		    name = NewVessel
		    type = NewVessel
		    title = Launch a new vessel
		    hideChildren = true
		}
		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}	
		PARAMETER
		{
			name = RendezvousTarget
			type = Rendezvous
			vessel = CommSat-60
			distance = 60
			relativeSpeed = 0.5
			title = Rendezvous with the Communications Satellite
		}
	}
	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = SpaceplaneVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = SpaceplaneVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}


	// ************ CLEANUP ************
	BEHAVIOUR
	{
		name = CleanupSatellite
		type = DestroyVessel
		onState = CONTRACT_COMPLETED
		vessel = CommSat-60
	}
}