CONTRACT_TYPE
{
	name = AdvPlane_StationModuleDelivery_Repeat
	title = Space Station Module Delivery (Expansion)
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>Our spaceplane has proven itself as a reliable shuttle! Our Mission Planners want to expand the capabilities of our station even further, using more launches from our spaceplane.<br><br><b>Number of Expansion Missions Completed: @/index / @/maxCompletions</b>

	synopsis = Deliver and dock an additional station module using the spaceplane, then return to Earth.

	completedMessage = Another module delivered and integrated. The station grows ever larger.

	sortKey = 424

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 4
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 120
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		ANY
		{
			active_program = EarlyEarthSpaceStation
			active_program = ModularSpaceStation
		}
	}
	// ************ TRACKING ************
	DATA
	{
		type = int
		index = $AdvPlane_StationModuleDelivery_Repeat_Count + 0
	}

	BEHAVIOUR
	{
		name = IncrementIndex
		type = Expression
		CONTRACT_COMPLETED_SUCCESS
		{
			AdvPlane_StationModuleDelivery_Repeat_Count = $AdvPlane_StationModuleDelivery_Repeat_Count + 1
		}
	}

	// Growing crew capacity requirement across repetitions
	DATA
	{
		type = List<int>
		capacityList = [5, 6, 7, 8]
	}
	DATA
	{
		type = int
		requiredCapacity = @/capacityList.ElementAt(@/index)
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = DeliveryGroup
		type = VesselParameterGroup
		title = Launch the spaceplane with a station module in the payload bay
		define = DeliverySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			crewOnly = true
			title = Have at least 2 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasDockingPort
			type = PartValidation
			partModule = ModuleDockingNode
			minCount = 2
			title = Vessel must have at least 2 docking ports — one for the station, one on the module
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			title = Reach orbit
			disableOnStateChange = true
			hideChildren = true
		}

		PARAMETER
		{
			name = RendezvousStation
			type = Rendezvous
			distance = 100
			title = Rendezvous with the station
			completeInSequence = true
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			defineDockedVessel = TargetStation
			title = Dock with the station to deliver the module
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = StationExpandedPersist
		type = VesselParameterGroup
		title = Confirm the expanded station remains in orbit
		vessel = TargetStation
		completeInSequence = true

		PARAMETER
		{
			name = Orbit
			type = Orbit
			minPeA = 250000
			maxApA = 500000
			targetBody = HomeWorld()
			title = The expanded station must be in a stable orbit with a perigee greater than 250 km and an apogee less than 500 km
			hideChildren = true
		}

		PARAMETER
		{
			name = HasExpandedCapacity
			type = HasCrewCapacity
			minCapacity = @/requiredCapacity
			title = The station now accommodates at least @/requiredCapacity crew
			hideChildren = true
		}
	}

	PARAMETER
	{
		name = ReturnGroup
		type = VesselParameterGroup
		title = Return the spaceplane to Earth — descent angle lower than 10 degrees
		vessel = DeliverySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = DeliverySpaceplane
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}