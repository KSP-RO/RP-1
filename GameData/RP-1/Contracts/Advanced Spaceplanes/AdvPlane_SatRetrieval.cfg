CONTRACT_TYPE
{
	name = AdvPlane_SatMaintenance
	title = Spaceplane Satellite Maintenance
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale	
	description = <b>Program: Advanced Spaceplanes<br>Type: <color=green>Required</color></b><br><br>We have been approached by a telecommunications company - their satellite has completely malfunctioned! They, or more accurately, their insurance company, have hired us to send a spaceplane up, recover the satellite and return it to Earth for refurbishment.	
	synopsis = Rendezvous with the target satellite in LEO and return to Earth with it.	
	completedMessage = Both spaceplane and satellite are home safe and sound!
	sortKey = 402	
	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 1
	maxSimultaneous = 1
	deadline = 0	
	targetBody = HomeWorld()	
	
	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 40
	failureReputation = 0	

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = AdvSpacePlanes
	}

    REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = AdvPlane_SatMaintenance
		title = Completed Satellite Maintenance mission
	}

	// ************ BACKGROUND VESSEL ************
	BEHAVIOUR
	{
		name = SpawnTargetSatellite
		type = SpawnVessel	
		VESSEL
		{
			name = DerelictSat
			craftPart = RP-1-CommunicationSat
			vesselType = Probe
			owned = false	
			ORBIT
			{
				SMA = 6771000
				ECC = 0.005
				INC = 28.5
				LAN = 150
				LPE = 90
				MNA = 0
				EPH = 0
				REF = 1
			}
		}
	}	
	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = MaintenanceMission
		type = VesselParameterGroup
		title = Spaceplane Maintenance Operations
		define = SpaceplaneVessel
		completeInSequence = true	
		PARAMETER
		{
		    name = NewVessel
		    type = NewVessel
		    title = Launch a new vessel
		    hideChildren = true
		}
		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 3
			crewOnly = true
			title = Have at least 3 crewmembers on board
			hideChildren = true
		}	
		PARAMETER
		{
			name = RendezvousTarget
			type = Rendezvous
			vessel = CommSat
			distance = 30
			relativeSpeed = 0.5
			title = Rendezvous with the Communications Satellite
			hideChildren = true
		}
	}
	PARAMETER
	{
		name = LandingVesselGroup
		type = VesselParameterGroup
		title = Land with a descent angle lower than 10 degrees
		vessel = SpaceplaneVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = SpaceplaneVessel
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}


	// ************ CLEANUP ************
	BEHAVIOUR
	{
		name = CleanupDerelict
		type = DestroyVessel
		onState = CONTRACT_FAILED
		vessel = DerelictSat
	}
}