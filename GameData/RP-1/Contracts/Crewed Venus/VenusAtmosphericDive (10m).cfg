CONTRACT_TYPE
{
    name = VenusAtmosphericDive10m
    title = Crewed Venusian Upper Atmosphere Dive (10 minutes)
    group = CrewedVenusExp
    agent = Flag Planting
    description = <b>Program: Crewed Venus Exploration <br>Type: <color=blue>Optional</color></b><br><br> Design and successfully launch a craft that can carry at least two crew into the upper atmosphere of Venus and return them safely to orbit.
	synopsis = Send a crewed vessel into the upper atmosphere of Venus
	completedMessage = Congratulations! The crew has returned safely and have provided our scientists with information to study.

    sortKey = 2503

    cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 4
	maxSimultaneous = 1
	deadline = 0

	targetBody = Venus
// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 700
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0
    
    // ************ REQUIREMENTS ************
REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedVenusExp
	}
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = VenusAtmosphericDive5m
	}
   
// ************ PARAMETERS ************
    PARAMETER
    {
        name = DiveSequence
        type = VesselParameterGroup
        title = Complete the 10-Minute Atmospheric Skim
        
        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            minCrew = 2
        }
        
        // This parameter tracks the time spent under 150km
        PARAMETER
        {
            name = InAtmosphere
            type = ReachState
            targetBody = Venus
            maxAltitude = 150000 // 150 km RSS Atmosphere Edge
            
            PARAMETER
            {
                name = StayDuration
                type = Duration
                duration = 10m
                pretitle = Maintain flight inside upper atmosphere for:
            }
        }
    }

    PARAMETER
    {
        name = ReturnToOrbit
        type = ReachState
        targetBody = Venus
        situation = ORBITING
        minPeriapsis = 150001
        title = Fire engines to escape the atmosphere and regain a stable orbit
        completeInSequence = true
    }
}