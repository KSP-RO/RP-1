CONTRACT_TYPE
{
	name = AdvPlane_StationResupply_Rep
	title = Space Station Resupply
	group = AdvSpacePlanes
	agent = Federation Aeronautique Internationale

	description = <b>Program: Advanced Spaceplanes<br>Type: <color=blue>Optional</color></b><br><br>Our spaceplane's station visit was so successful, that our scientists want you to do it again! The Mission Planning staff also got involved, so the spaceplane will have to carry some supplies to the station. <br><br><b>Number of Resupply Missions Completed: @/index / @/maxCompletions</b>

	genericDescription = Launch a spaceplane resupply mission, dock with an existing space station, and return to Earth.

	synopsis = Resupply an existing space station using the spaceplane.

	completedMessage = Resupply complete! The station crew has everything they need to continue their work.

	sortKey = 422

	cancellable = true
	declinable = true
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 6
	maxSimultaneous = 1
	deadline = 0

	targetBody = HomeWorld()

	// ************ REWARDS ************
	prestige = Trivial
	advanceFunds = 0
	rewardScience = 0
	rewardFunds = 0
	failureFunds = 0
	rewardReputation = 200
	failureReputation = 0

	// ************ REQUIREMENTS ************
	REQUIREMENT
	{
		ANY
		{
			active_program = EarlyEarthSpaceStation
			active_program = ModularSpaceStation
		}
	}

	// ************ TRACKING ************
	DATA
	{
		type = int
		index = $AdvPlane_StationResupply_Count + 0
	}

	BEHAVIOUR
	{
		name = IncrementIndex
		type = Expression
		CONTRACT_COMPLETED_SUCCESS
		{
			AdvPlane_StationResupply_Count = $AdvPlane_StationResupply_Count + 1
		}
	}

	// ************ MISSION PARAMETERS ************
	PARAMETER
	{
		name = ResupplyGroup
		type = VesselParameterGroup
		title = Launch the resupply spaceplane
		define = ResupplySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a new vessel
			hideChildren = true
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			crewOnly = true
			title = Have at least 2 crewmembers on board
			hideChildren = true
		}

		PARAMETER
		{
			name = HasDockingPort
			type = PartValidation
			partModule = ModuleDockingNode
			minCount = 1
			title = Vessel must have a docking port
			hideChildren = true
		}

		PARAMETER
		{
			name = HasResearchPayload
			type = HasResource
			resource = ResearchPayload
			minQuantity = 375
			title = Carry at least 375 units of Research Payload (15 days of supplies)
			hideChildren = true
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			minPeA = 140000
			title = Reach orbit
			disableOnStateChange = true
			hideChildren = true
		}

		PARAMETER
		{
			name = RendezvousStation
			type = Rendezvous
			distance = 100
			title = Rendezvous with the station
			completeInSequence = true
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			defineDockedVessel = TargetStation
			title = Dock with the station
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = ReturnGroup
		type = VesselParameterGroup
		title = Return the spaceplane to Earth — descent angle lower than 10 degrees
		vessel = ResupplySpaceplane
		completeInSequence = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}

	PARAMETER
	{
		name = OptVesselGroup
		type = VesselParameterGroup
		title = OPTIONAL: Land on the runway with a descent angle lower than 10 degrees
		rewardReputation = Round(@/rewardReputation * 0.3 + 0.4999, 1)
		optional = true
		vessel = ResupplySpaceplane
		hideChildren = true

		PARAMETER
		{
			name = HorizontalLanding
			type = HorizontalLanding
			descentAngle = 10
			hideChildren = true
			completeInSequence = true
		}

		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			landAtFacility = Runway
			maxSpeed = 5
			hideChildren = true
			completeInSequence = true
		}
	}
}