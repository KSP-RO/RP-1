CONTRACT_TYPE
{
	name = VenusFlybyCrewedRep
	title = Crewed Venus Flyby
	group = CrewedVenusExp
	agent = Flag Planting

	description = Design, build and launch a mission that sends at least two humans on a flyby of Venus and return them home safely to Earth.&br;&br;<color=green>NOTE: This contract will become unavailable once a Crewed Venus Orbit contract is accepted or completed.

	synopsis = Send a crewed vessel on a flyby of Venus

	completedMessage = Congratulations!
	sortKey = 1604

	cancellable = true
	declinable = false
	autoAccept = false
	minExpiry = 0
	maxExpiry = 0
	maxCompletions = 2
	maxSimultaneous = 1
	deadline = 0

	targetBody = Venus


	// ************ REWARDS ************
	prestige = Significant
	advanceFunds = 0
	rewardScience = 0
	rewardReputation = 800
	rewardFunds = 0
	failureReputation = 0
	failureFunds = 0

	// ************ REQUIREMENTS ************

	REQUIREMENT
	{
		name = ProgramActive
		type = ProgramActive
		program = CrewedVenusExp
	}
	
	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = first_VenusFlybyCrewed
	}

	REQUIREMENT
	{
		name = CompleteContract
		type = CompleteContract
		contractType = first_VenusOrbitCrew
		invertRequirement = true
	}
	
	PARAMETER
	{
		name = FlybyCrew
		type = VesselParameterGroup
		title = Crewed flyby of @targetBody
		define = FlybyVenusCrew

		PARAMETER
		{
			name = NewVessel
			type = NewVessel
			title = Launch a New Vessel
			hideChildren = true
		}
		PARAMETER
		{
			name = OneCrew
			type = HasCrew
			minCrew = 2
			crewOnly = true
			title = Have at least 2 crewmember on board
			hideChildren = true
		}
		PARAMETER
		{
			name = FlybyPlanet
			type = ReachState
			targetBody = Venus
			maxAltitude = 40000000
			disableOnStateChange = true
			title = Flyby Venus within 40Mm
			hideChildren = true
		}
		PARAMETER
		{
			name = ReturnHome
			type = RP1ReturnHome
			title = Return Home Safely
			hideChildren = true
			completeInSequence = true
		}
	}
}
